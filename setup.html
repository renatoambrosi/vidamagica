<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Mágica — Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8922A;
    --gold-light: #E8C97A;
    --bg: #0D0800;
    --bg2: rgba(26,18,5,0.8);
    --border: rgba(200,146,42,0.2);
    --text: #F5F0E8;
    --text-muted: rgba(245,240,232,0.45);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 480px;
    width: 100%;
    backdrop-filter: blur(12px);
    text-align: center;
  }
  h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }
  p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.5rem; }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0.85rem; text-align: left; }
  label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  input {
    background: rgba(36,24,8,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: rgba(200,146,42,0.5); }

  .btn {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, #7A5818, #C8922A);
    color: var(--bg);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.82rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .result {
    margin-top: 1.25rem;
    padding: 0.85rem;
    border-radius: 8px;
    font-size: 0.82rem;
    display: none;
  }
  .result.success { background: rgba(90,158,111,0.12); border: 1px solid rgba(90,158,111,0.35); color: #7FD49A; }
  .result.error   { background: rgba(200,80,77,0.12);  border: 1px solid rgba(200,80,77,0.35);  color: #F09090; }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(200,146,42,0.25), transparent); margin: 1.5rem 0; }
</style>
</head>
<body>
<div class="card">
  <h1>Vida Mágica — Setup</h1>
  <p>Popula os preços iniciais no banco de dados. Execute apenas uma vez.</p>

  <div class="divider"></div>

  <div class="field">
    <label>Usuário Admin</label>
    <input type="text" id="user" placeholder="renato">
  </div>
  <div class="field">
    <label>Senha Admin</label>
    <input type="password" id="pass" placeholder="••••••••">
  </div>

  <button class="btn" id="btn" onclick="rodarSeed()">Executar Setup</button>

  <div class="result" id="result"></div>
</div>

<script>
async function rodarSeed() {
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const btn  = document.getElementById('btn');
  const result = document.getElementById('result');

  if (!user || !pass) {
    mostrar('Preencha usuário e senha.', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Executando...';
  result.style.display = 'none';

  try {
    const credentials = btoa(`${user}:${pass}`);
    const r = await fetch('https://vidamagica-production.up.railway.app/api/admin/seed', {
      method: 'POST',
      headers: {
        'Authorization': `Basic ${credentials}`,
        'Content-Type': 'application/json'
      }
    });

    const data = await r.json();

    if (r.ok) {
      mostrar(`✓ ${data.message || 'Setup concluído com sucesso!'}`, 'success');
      btn.textContent = 'Concluído ✓';
    } else {
      mostrar(`✗ Erro: ${data.error || 'Falha na autenticação'}`, 'error');
      btn.disabled = false;
      btn.textContent = 'Executar Setup';
    }
  } catch(e) {
    mostrar('✗ Não foi possível conectar à API.', 'error');
    btn.disabled = false;
    btn.textContent = 'Executar Setup';
  }
}

function mostrar(msg, tipo) {
  const el = document.getElementById('result');
  el.textContent = msg;
  el.className = `result ${tipo}`;
  el.style.display = 'block';
}
</script>
</body>
</html>
