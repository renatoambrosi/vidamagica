<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Theme - Vida Mágica</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-secondary);
      padding: 16px;
      font-family: var(--font-body);
    }
    .bg-sample {
      width: 100%;
      height: 280px;
      background-image: url('../assets/background-theme.jpg');
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      position: relative;
    }
    .overlay-text {
      position: absolute;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: var(--radius-base);
      font-size: 11px;
      color: var(--text-primary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="bg-sample">
    <div class="overlay-text">
      Signature background: warm golden gradient with bokeh light particles, blue morpho butterflies in lower right. Creates ethereal, luxurious, spiritual atmosphere.
    </div>
  </div>
</body>
</html>
