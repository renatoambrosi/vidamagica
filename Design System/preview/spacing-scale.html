<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spacing Scale - Vida Mágica</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-secondary);
      padding: 20px;
      font-family: var(--font-body);
    }
    .spacing-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 700px;
    }
    .spacing-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: white;
      padding: 8px 12px;
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
    }
    .space-visual {
      background: var(--color-gold-amber);
      height: 20px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .space-info {
      font-size: 11px;
      color: var(--text-secondary);
      display: flex;
      gap: 12px;
    }
    .token {
      font-family: 'Courier New', monospace;
      color: var(--text-primary);
      font-weight: var(--weight-semibold);
      min-width: 80px;
    }
  </style>
</head>
<body>
  <div class="spacing-list">
    <div class="spacing-item">
      <div class="space-visual" style="width: var(--space-2);"></div>
      <div class="space-info">
        <span class="token">--space-2</span>
        <span>8px</span>
      </div>
    </div>
    <div class="spacing-item">
      <div class="space-visual" style="width: var(--space-4);"></div>
      <div class="space-info">
        <span class="token">--space-4</span>
        <span>16px</span>
      </div>
    </div>
    <div class="spacing-item">
      <div class="space-visual" style="width: var(--space-6);"></div>
      <div class="space-info">
        <span class="token">--space-6</span>
        <span>24px</span>
      </div>
    </div>
    <div class="spacing-item">
      <div class="space-visual" style="width: var(--space-8);"></div>
      <div class="space-info">
        <span class="token">--space-8</span>
        <span>32px</span>
      </div>
    </div>
    <div class="spacing-item">
      <div class="space-visual" style="width: var(--space-12);"></div>
      <div class="space-info">
        <span class="token">--space-12</span>
        <span>48px</span>
      </div>
    </div>
    <div class="spacing-item">
      <div class="space-visual" style="width: var(--space-16);"></div>
      <div class="space-info">
        <span class="token">--space-16</span>
        <span>64px</span>
      </div>
    </div>
  </div>
</body>
</html>
