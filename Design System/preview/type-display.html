<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Typography - Vida Mágica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: var(--font-display);
      background: var(--bg-secondary);
      padding: 24px;
    }
    .type-specimen {
      margin-bottom: 32px;
    }
    .sample {
      background: white;
      padding: 20px;
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
      margin-bottom: 8px;
    }
    .h1 {
      font-size: var(--text-5xl);
    }
    .h2 {
      font-size: var(--text-4xl);
    }
    .h3 {
      font-size: var(--text-3xl);
    }
    .meta {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: var(--weight-regular);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="type-specimen">
    <div class="sample">
      <div class="h1">VIDA MÁGICA</div>
    </div>
    <div class="meta">Montserrat Black, 48px, uppercase, tight spacing</div>
  </div>

  <div class="type-specimen">
    <div class="sample">
      <div class="h2">TRANSFORMAÇÃO</div>
    </div>
    <div class="meta">Montserrat ExtraBold, 36px, uppercase</div>
  </div>

  <div class="type-specimen">
    <div class="sample">
      <div class="h3">Desperte Sua Prosperidade</div>
    </div>
    <div class="meta">Montserrat Bold, 30px</div>
  </div>
</body>
</html>
