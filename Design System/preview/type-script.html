<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Typography - Vida Mágica</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-secondary);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }
    .sample {
      background: white;
      padding: 32px;
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
    .script {
      font-family: var(--font-body);
      font-size: 48px;
      color: var(--color-gold-amber);
      font-weight: 300;
      font-style: italic;
    }
    .meta {
      font-family: var(--font-body);
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="sample">
    <div class="script">Suellen Seragi</div>
    <div class="meta">Open Sans Light Italic, 48px, gold color — for names & elegant accents</div>
  </div>
</body>
</html>
