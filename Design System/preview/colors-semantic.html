<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cores Semânticas - Vida Mágica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-secondary);
      padding: 20px;
    }
    .semantic-grid {
      display: grid;
      gap: 12px;
      max-width: 700px;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 8px 12px;
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
    }
    .color-sample {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.08);
    }
    .color-info {
      flex: 1;
    }
    .var-name {
      font-size: 12px;
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      font-family: 'Courier New', monospace;
    }
    .usage {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="semantic-grid">
    <div class="color-row">
      <div class="color-sample" style="background: var(--interactive-default);"></div>
      <div class="color-info">
        <div class="var-name">--interactive-default</div>
        <div class="usage">Botões, links, elementos interativos</div>
      </div>
    </div>
    <div class="color-row">
      <div class="color-sample" style="background: var(--interactive-hover);"></div>
      <div class="color-info">
        <div class="var-name">--interactive-hover</div>
        <div class="usage">Estado hover</div>
      </div>
    </div>
    <div class="color-row">
      <div class="color-sample" style="background: var(--text-primary);"></div>
      <div class="color-info">
        <div class="var-name">--text-primary</div>
        <div class="usage">Texto principal</div>
      </div>
    </div>
    <div class="color-row">
      <div class="color-sample" style="background: var(--text-gold);"></div>
      <div class="color-info">
        <div class="var-name">--text-gold</div>
        <div class="usage">Texto de destaque, ênfase dourada</div>
      </div>
    </div>
    <div class="color-row">
      <div class="color-sample" style="background: var(--text-accent);"></div>
      <div class="color-info">
        <div class="var-name">--text-accent</div>
        <div class="usage">Links, acentos em azul</div>
      </div>
    </div>
    <div class="color-row">
      <div class="color-sample" style="background: var(--bg-primary); border: 1px solid var(--border-medium);"></div>
      <div class="color-info">
        <div class="var-name">--bg-primary</div>
        <div class="usage">Fundo principal</div>
      </div>
    </div>
    <div class="color-row">
      <div class="color-sample" style="background: var(--bg-dark);"></div>
      <div class="color-info">
        <div class="var-name">--bg-dark</div>
        <div class="usage">Fundo escuro para contraste</div>
      </div>
    </div>
  </div>
</body>
</html>
