<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paleta Principal - Vida Mágica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg-secondary);
      padding: 24px;
    }
    .palette {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      max-width: 700px;
    }
    .swatch {
      text-align: center;
    }
    .color-box {
      height: 80px;
      border-radius: var(--radius-base);
      margin-bottom: 8px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .color-name {
      font-size: 11px;
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .color-hex {
      font-size: 10px;
      color: var(--text-secondary);
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="palette">
    <div class="swatch">
      <div class="color-box" style="background: #C8922A;"></div>
      <div class="color-name">Gold Amber</div>
      <div class="color-hex">#C8922A</div>
    </div>
    <div class="swatch">
      <div class="color-box" style="background: #E8C97A;"></div>
      <div class="color-name">Gold Light</div>
      <div class="color-hex">#E8C97A</div>
    </div>
    <div class="swatch">
      <div class="color-box" style="background: #F4D998;"></div>
      <div class="color-name">Gold Bright</div>
      <div class="color-hex">#F4D998</div>
    </div>
    <div class="swatch">
      <div class="color-box" style="background: #F5F0E8; border: 1px solid #D9CFC0;"></div>
      <div class="color-name">Pearl White</div>
      <div class="color-hex">#F5F0E8</div>
    </div>
    <div class="swatch">
      <div class="color-box" style="background: #1E8FD5;"></div>
      <div class="color-name">Blue Butterfly</div>
      <div class="color-hex">#1E8FD5</div>
    </div>
    <div class="swatch">
      <div class="color-box" style="background: #1A1205;"></div>
      <div class="color-name">Brown Dark</div>
      <div class="color-hex">#1A1205</div>
    </div>
  </div>
</body>
</html>
