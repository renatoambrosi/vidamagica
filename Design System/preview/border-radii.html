<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Radii - Vida Mágica</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-secondary);
      padding: 20px;
      font-family: var(--font-body);
    }
    .radii-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      max-width: 700px;
    }
    .radius-item {
      text-align: center;
    }
    .radius-box {
      background: white;
      border: 2px solid var(--color-gold-light);
      height: 80px;
      margin-bottom: 8px;
      box-shadow: var(--shadow-sm);
    }
    .label {
      font-size: 10px;
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
    .value {
      font-size: 9px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="radii-grid">
    <div class="radius-item">
      <div class="radius-box" style="border-radius: var(--radius-sm);"></div>
      <div class="label">radius-sm</div>
      <div class="value">4px</div>
    </div>
    <div class="radius-item">
      <div class="radius-box" style="border-radius: var(--radius-base);"></div>
      <div class="label">radius-base</div>
      <div class="value">8px</div>
    </div>
    <div class="radius-item">
      <div class="radius-box" style="border-radius: var(--radius-md);"></div>
      <div class="label">radius-md</div>
      <div class="value">12px</div>
    </div>
    <div class="radius-item">
      <div class="radius-box" style="border-radius: var(--radius-lg);"></div>
      <div class="label">radius-lg</div>
      <div class="value">16px</div>
    </div>
    <div class="radius-item">
      <div class="radius-box" style="border-radius: var(--radius-xl);"></div>
      <div class="label">radius-xl</div>
      <div class="value">24px</div>
    </div>
  </div>
</body>
</html>
