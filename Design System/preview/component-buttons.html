<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Component - Vida Mágica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-secondary);
      padding: 24px;
      font-family: var(--font-body);
    }
    .buttons-grid {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: var(--weight-semibold);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: var(--radius-base);
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary {
      background: var(--color-gold-amber);
      color: white;
    }
    .btn-primary:hover {
      background: var(--color-gold-deep);
      box-shadow: var(--shadow-md);
    }
    .btn-secondary {
      background: white;
      color: var(--color-gold-amber);
      border: 2px solid var(--color-gold-amber);
    }
    .btn-secondary:hover {
      background: var(--color-pearl-white);
    }
    .btn-dark {
      background: var(--color-brown-dark);
      color: var(--color-gold-light);
    }
    .btn-dark:hover {
      background: var(--color-brown-medium);
      box-shadow: var(--glow-gold);
    }
  </style>
</head>
<body>
  <div class="buttons-grid">
    <button class="btn btn-primary">Começar Agora</button>
    <button class="btn btn-secondary">Saiba Mais</button>
    <button class="btn btn-dark">Transforme Sua Vida</button>
  </div>
</body>
</html>
