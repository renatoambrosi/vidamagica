<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Motifs - Vida Mágica</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg-secondary);
      padding: 20px;
      font-family: var(--font-body);
    }
    .motifs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      max-width: 700px;
    }
    .motif-card {
      background: white;
      padding: 24px;
      border-radius: var(--radius-base);
      box-shadow: var(--shadow-sm);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 140px;
      justify-content: center;
    }
    .motif-img {
      max-width: 80px;
      max-height: 80px;
      object-fit: contain;
    }
    .motif-img.starburst {
      max-width: 70px;
      max-height: 70px;
    }
    .label {
      font-size: 11px;
      font-weight: var(--weight-semibold);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="motifs-grid">
    <div class="motif-card">
      <img src="../assets/starburst.png" class="motif-img starburst" alt="Starburst">
      <div class="label">Starburst</div>
    </div>
    <div class="motif-card">
      <img src="../assets/butterflies-blue.png" class="motif-img" alt="Blue Butterflies">
      <div class="label">Blue Morpho</div>
    </div>
    <div class="motif-card">
      <img src="../assets/butterfly-gold.webp" class="motif-img" alt="Golden Butterfly">
      <div class="label">Golden Butterfly</div>
    </div>
  </div>
</body>
</html>
