<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atendimento — Vida Mágica</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0F0E0B; color: #F0EAD6; height: 100vh; overflow: hidden; }
    .app { display: grid; grid-template-columns: 320px 1fr 280px; height: 100vh; }

    .col-header { background: #1A1813; border-bottom: 1px solid rgba(201,168,76,0.15); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .col-header h2 { font-size: 14px; font-weight: 600; color: #C9A84C; letter-spacing: 0.04em; }
    .col-header .meta { font-size: 11px; color: #8A8070; }

    .col-lista { background: #161410; border-right: 1px solid rgba(201,168,76,0.1); display: flex; flex-direction: column; }
    .lista-stats { padding: 10px 14px; font-size: 11px; color: #8A8070; display: flex; gap: 12px; border-bottom: 1px solid rgba(201,168,76,0.08); }
    .lista-stats span { color: #C9A84C; font-weight: 600; margin-right: 4px; }
    .lista-conversas { overflow-y: auto; flex: 1; }
    .conv-item { padding: 12px 14px; border-bottom: 1px solid rgba(201,168,76,0.06); cursor: pointer; transition: background 150ms; display: flex; gap: 10px; align-items: flex-start; }
    .conv-item:hover { background: rgba(201,168,76,0.04); }
    .conv-item.active { background: rgba(201,168,76,0.1); border-left: 3px solid #C9A84C; padding-left: 11px; }
    .conv-item.prio { background: rgba(245,158,11,0.04); }
    .conv-item.prio.active { background: rgba(245,158,11,0.12); border-left-color: #f59e0b; }
    .conv-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #8B6914, #C9A84C); color: #0F0E0B; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; overflow: hidden; }
    .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .conv-info { flex: 1; min-width: 0; }
    .conv-row1 { display: flex; justify-content: space-between; gap: 6px; align-items: baseline; }
    .conv-nome { font-size: 13px; font-weight: 600; color: #F0EAD6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-tempo { font-size: 10px; color: #8A8070; flex-shrink: 0; }
    .conv-preview { font-size: 12px; color: #8A8070; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .tag.prio { background: rgba(245,158,11,0.2); color: #fbbf24; }
    .tag.basic { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .tag.free { background: rgba(255,255,255,0.06); color: #8A8070; }
    .tag.bloq { background: rgba(239,68,68,0.15); color: #f87171; }
    .tag.fav { background: rgba(201,168,76,0.15); color: #fbbf24; }
    .tag.unread { background: #C9A84C; color: #0F0E0B; }

    .col-chat { display: flex; flex-direction: column; background: #0F0E0B; }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .chat-empty { display: flex; flex: 1; align-items: center; justify-content: center; color: #8A8070; font-size: 14px; }
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.45; word-wrap: break-word; }
    .msg.aluna { align-self: flex-start; background: #1A1813; border: 1px solid rgba(201,168,76,0.1); color: #F0EAD6; border-bottom-left-radius: 4px; }
    .msg.suellen { align-self: flex-end; background: linear-gradient(135deg, #8B6914, #C9A84C); color: #0F0E0B; border-bottom-right-radius: 4px; }
    .msg .quem { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.8; }
    .msg .checks { font-size: 11px; margin-top: 4px; text-align: right; opacity: 0.6; }
    .msg .checks.lida { opacity: 1; }
    .msg .ts { font-size: 10px; opacity: 0.6; margin-top: 4px; }

    .composer { padding: 14px 20px; border-top: 1px solid rgba(201,168,76,0.1); background: #161410; }
    .composer-tools { display: flex; gap: 12px; margin-bottom: 8px; align-items: center; }
    .composer-tools .switch { display: flex; gap: 4px; background: #0F0E0B; padding: 4px; border-radius: 8px; border: 1px solid rgba(201,168,76,0.15); }
    .composer-tools .switch button { background: transparent; border: none; color: #8A8070; padding: 5px 12px; font-size: 11px; border-radius: 5px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .composer-tools .switch button.active { background: linear-gradient(135deg, #8B6914, #C9A84C); color: #0F0E0B; }
    .composer-row { display: flex; gap: 8px; }
    .composer-row textarea { flex: 1; background: #0F0E0B; border: 1px solid rgba(201,168,76,0.15); color: #F0EAD6; padding: 10px 14px; border-radius: 8px; font-family: inherit; font-size: 14px; resize: none; min-height: 42px; max-height: 140px; }
    .composer-row textarea:focus { outline: none; border-color: #C9A84C; }
    .composer-row button { padding: 10px 22px; background: linear-gradient(135deg, #8B6914, #C9A84C); color: #0F0E0B; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .composer-row button:disabled { opacity: 0.4; cursor: not-allowed; }

    .col-perfil { background: #161410; border-left: 1px solid rgba(201,168,76,0.1); display: flex; flex-direction: column; overflow-y: auto; }
    .perfil-empty { padding: 30px 20px; text-align: center; color: #8A8070; font-size: 13px; }
    .perfil-card { padding: 20px 18px; }
    .perfil-card h3 { font-size: 15px; font-weight: 600; color: #F0EAD6; margin-bottom: 4px; }
    .perfil-card .tel { font-family: monospace; font-size: 12px; color: #8A8070; margin-bottom: 14px; }
    .perfil-block { margin-bottom: 18px; }
    .perfil-block .label { font-size: 10px; color: #8A8070; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .perfil-block .valor { font-size: 13px; color: #F0EAD6; }
    .acoes { display: flex; flex-direction: column; gap: 6px; padding: 16px 18px; border-top: 1px solid rgba(201,168,76,0.08); }
    .acoes button { padding: 8px 12px; background: #1A1813; border: 1px solid rgba(201,168,76,0.2); color: #C9A84C; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; font-weight: 600; text-align: left; }
    .acoes button:hover { background: rgba(201,168,76,0.08); }
    .acoes button.danger { color: #f87171; border-color: rgba(239,68,68,0.3); }
    .acoes button.danger:hover { background: rgba(239,68,68,0.08); }

    .ws-pill { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 700; }
    .ws-pill.on { background: rgba(74,222,128,0.15); color: #4ade80; }
    .ws-pill.off { background: rgba(239,68,68,0.15); color: #f87171; }

    .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-overlay.hidden { display: none; }
    .login-box { background: #1A1813; padding: 28px; border-radius: 14px; width: 90%; max-width: 360px; border: 1px solid rgba(201,168,76,0.2); }
    .login-box h2 { color: #C9A84C; font-weight: 300; letter-spacing: 0.04em; margin-bottom: 18px; }
    .login-box input { width: 100%; padding: 10px 14px; background: #0F0E0B; border: 1px solid rgba(201,168,76,0.2); color: #F0EAD6; border-radius: 8px; font-size: 15px; margin-bottom: 10px; font-family: inherit; }
    .login-box button { width: 100%; padding: 11px; background: linear-gradient(135deg, #8B6914, #C9A84C); color: #0F0E0B; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 6px; }
    .login-erro { color: #f87171; font-size: 12px; margin-top: 8px; min-height: 16px; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .col-lista, .col-perfil { display: none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 Atendimento</h2>
    <input id="lUser" placeholder="Usuário" autocomplete="username" />
    <input id="lPass" type="password" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')logar()" />
    <button onclick="logar()">Entrar</button>
    <div class="login-erro" id="lErro"></div>
  </div>
</div>

<div class="app" id="app" style="display:none">

  <!-- COLUNA LISTA -->
  <aside class="col-lista">
    <div class="col-header">
      <h2>💬 Conversas</h2>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="ws-pill off" id="wsPill">offline</span>
        <button onclick="logout()" style="background:none;border:none;color:#8A8070;cursor:pointer;font-size:11px">sair</button>
      </div>
    </div>
    <div class="lista-stats">
      <div><span id="statTotal">—</span>total</div>
      <div><span id="statPrio">—</span>prio</div>
      <div><span id="statNaoLidas">—</span>não lidas</div>
    </div>
    <div class="lista-conversas" id="listaConversas">
      <div style="padding:30px;text-align:center;color:#8A8070;font-size:13px">Carregando...</div>
    </div>
  </aside>

  <!-- COLUNA CHAT -->
  <main class="col-chat">
    <div class="col-header">
      <h2 id="headerNome">Selecione uma conversa</h2>
      <span class="meta" id="headerMeta"></span>
    </div>
    <div class="chat-msgs" id="chatMsgs">
      <div class="chat-empty">Selecione uma conversa para começar</div>
    </div>
    <div class="composer" id="composer" style="display:none">
      <div class="composer-tools">
        <span style="font-size:11px;color:#8A8070">Responder como:</span>
        <div class="switch">
          <button class="active" id="btnSuellen" onclick="setIdent('suellen')">✨ Suellen</button>
          <button id="btnEquipe" onclick="setIdent('equipe')">⭐ Equipe</button>
        </div>
      </div>
      <div class="composer-row">
        <textarea id="inputMsg" placeholder="Digite a resposta..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar()}"></textarea>
        <button id="btnEnviar" onclick="enviar()">Enviar</button>
      </div>
    </div>
  </main>

  <!-- COLUNA PERFIL -->
  <aside class="col-perfil">
    <div class="col-header">
      <h2>👤 Perfil</h2>
    </div>
    <div class="perfil-empty" id="perfilEmpty">Nenhuma conversa selecionada</div>
    <div id="perfilContent" style="display:none">
      <div class="perfil-card">
        <h3 id="pNome">—</h3>
        <div class="tel" id="pTel">—</div>
        <div class="perfil-block">
          <div class="label">Plano da aluna</div>
          <div class="valor" id="pPlano">—</div>
        </div>
        <div class="perfil-block">
          <div class="label">Plano do chat</div>
          <div class="valor" id="pPlanoChat">—</div>
        </div>
        <div class="perfil-block" id="bInteracoes" style="display:none">
          <div class="label">Interações restantes</div>
          <div class="valor" id="pInteracoes">—</div>
        </div>
        <div class="perfil-block" id="bExpira" style="display:none">
          <div class="label">Prioritário expira em</div>
          <div class="valor" id="pExpira">—</div>
        </div>
        <div class="perfil-block">
          <div class="label">Status</div>
          <div class="valor" id="pStatus">—</div>
        </div>
      </div>
      <div class="acoes">
        <button onclick="acaoFavoritar()">⭐ <span id="btnFavTxt">Favoritar</span></button>
        <button onclick="acaoCortesia()">🎁 Dar cortesia (24h, 30 interações)</button>
        <button onclick="acaoAjustar()">✏️ Ajustar interações</button>
        <button onclick="acaoEstender()">⏱️ Estender prioritário</button>
        <button onclick="acaoRebaixar()">↓ Rebaixar para basic</button>
        <button class="danger" onclick="acaoBloquear()">🚫 Bloquear conversa</button>
        <button onclick="acaoDesbloquear()">✓ Desbloquear conversa</button>
      </div>
    </div>
  </aside>

</div>

<script>
  // ── AUTH ──
  // Token Basic guardado no localStorage e enviado em TODAS as chamadas
  let basicToken = localStorage.getItem('vm_atend_token') || '';
  let conversas = [];
  let conversaAtual = null;
  let usuarioAtual = null;
  let identidade = 'suellen';
  let ws = null;

  // Se já tem token salvo, valida antes de mostrar o app
  if (basicToken) {
    validarToken();
  }

  async function validarToken() {
    try {
      const r = await fetch('/api/atendimento/chat/conversas', {
        headers: { 'Authorization': 'Basic ' + basicToken }
      });
      if (r.ok) {
        mostrarApp();
      } else {
        // Token inválido, limpa e mostra login
        localStorage.removeItem('vm_atend_token');
        basicToken = '';
      }
    } catch (_) {
      localStorage.removeItem('vm_atend_token');
      basicToken = '';
    }
  }

  async function logar() {
    const u = document.getElementById('lUser').value.trim();
    const p = document.getElementById('lPass').value;
    if (!u || !p) {
      document.getElementById('lErro').textContent = 'Usuário e senha obrigatórios';
      return;
    }
    const token = btoa(`${u}:${p}`);
    try {
      const r = await fetch('/api/atendimento/chat/conversas', {
        headers: { 'Authorization': 'Basic ' + token }
      });
      if (r.ok) {
        basicToken = token;
        localStorage.setItem('vm_atend_token', token);
        document.getElementById('lErro').textContent = '';
        mostrarApp();
      } else {
        document.getElementById('lErro').textContent = '✕ Usuário ou senha incorretos';
      }
    } catch (err) {
      document.getElementById('lErro').textContent = '✕ Erro de conexão';
    }
  }

  function logout() {
    localStorage.removeItem('vm_atend_token');
    basicToken = '';
    if (ws) try { ws.close(); } catch (_) {}
    location.reload();
  }

  function mostrarApp() {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('app').style.display = 'grid';
    iniciar();
  }

  // ── INIT ──
  function iniciar() {
    carregar();
    conectarWs();
    setInterval(carregar, 30000);
  }

  // ── API — sempre com Authorization Basic ──
  async function api(path, method = 'GET', body = null) {
    const opt = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Basic ' + basicToken,
      }
    };
    if (body) opt.body = JSON.stringify(body);
    const r = await fetch(path, opt);
    if (r.status === 401) {
      // token deixou de valer, força relogin
      logout();
      return null;
    }
    return await r.json().catch(() => ({}));
  }

  // ── LISTA ──
  async function carregar() {
    const d = await api('/api/atendimento/chat/conversas');
    if (!d) return;
    conversas = d.conversas || [];
    renderLista();
    atualizarStats();
  }

  function atualizarStats() {
    document.getElementById('statTotal').textContent = conversas.length;
    document.getElementById('statPrio').textContent = conversas.filter(c => c.plano_chat === 'prioritario' && c.prioritario_expira_em && new Date(c.prioritario_expira_em) > new Date()).length;
    document.getElementById('statNaoLidas').textContent = conversas.reduce((acc, c) => acc + (c.nao_lidas_suellen || 0), 0);
  }

  function renderLista() {
    const el = document.getElementById('listaConversas');
    if (!conversas.length) {
      el.innerHTML = '<div style="padding:30px;text-align:center;color:#8A8070;font-size:13px">Nenhuma conversa</div>';
      return;
    }
    el.innerHTML = conversas.map(c => {
      const u = c.usuario || {};
      const ehPrio = c.plano_chat === 'prioritario' && c.prioritario_expira_em && new Date(c.prioritario_expira_em) > new Date();
      const inicial = (u.nome || '?').charAt(0).toUpperCase();
      const tags = [];
      if (ehPrio) tags.push('<span class="tag prio">PRIO</span>');
      else if (u.plano && u.plano !== 'gratuito') tags.push('<span class="tag basic">BASIC</span>');
      else tags.push('<span class="tag free">FREE</span>');
      if (c.bloqueada) tags.push('<span class="tag bloq">BLOQ</span>');
      if (c.favoritada) tags.push('<span class="tag fav">★</span>');
      if (c.nao_lidas_suellen > 0) tags.push(`<span class="tag unread">${c.nao_lidas_suellen}</span>`);
      const ativaClass = conversaAtual && c.id === conversaAtual.id ? 'active' : '';
      return `
        <div class="conv-item ${ehPrio ? 'prio' : ''} ${ativaClass}" onclick="abrirConversa(${c.id})">
          <div class="conv-avatar">${u.foto_url ? `<img src="${u.foto_url}">` : inicial}</div>
          <div class="conv-info">
            <div class="conv-row1">
              <span class="conv-nome">${esc(u.nome || u.telefone || '(?)')}</span>
              <span class="conv-tempo">${tempoRel(c.ultima_mensagem_em)}</span>
            </div>
            <div class="conv-preview">${esc(c.ultima_preview || '—')}</div>
            <div class="conv-tags">${tags.join('')}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function abrirConversa(id) {
    const d = await api('/api/atendimento/chat/conversa/' + id);
    if (!d) return;
    conversaAtual = d.conversa;
    usuarioAtual = d.usuario;
    renderLista();
    renderHeader();
    renderMensagens(d.mensagens || []);
    renderPerfil();
    document.getElementById('composer').style.display = 'block';
  }

  function renderHeader() {
    if (!conversaAtual || !usuarioAtual) return;
    document.getElementById('headerNome').textContent = usuarioAtual.nome || usuarioAtual.telefone || '(?)';
    const ehPrio = conversaAtual.plano_chat === 'prioritario' && new Date(conversaAtual.prioritario_expira_em) > new Date();
    document.getElementById('headerMeta').textContent = ehPrio
      ? `🟡 Prioritário · ${conversaAtual.interacoes_restantes} interações`
      : (usuarioAtual.plano && usuarioAtual.plano !== 'gratuito' ? '🔵 Basic VM' : '⚪ Free');
  }

  function renderMensagens(msgs) {
    const el = document.getElementById('chatMsgs');
    if (!msgs.length) {
      el.innerHTML = '<div class="chat-empty">Nenhuma mensagem ainda</div>';
      return;
    }
    el.innerHTML = '';
    msgs.forEach(m => el.appendChild(montarBolha(m)));
    el.scrollTop = el.scrollHeight;
  }

  function montarBolha(m) {
    const d = document.createElement('div');
    d.className = 'msg ' + (m.remetente === 'aluna' ? 'aluna' : 'suellen');
    d.dataset.id = m.id;
    let html = '';
    if (m.remetente === 'suellen') {
      html += `<div class="quem">${m.identidade === 'equipe' ? '⭐ Equipe' : '✨ Suellen'}</div>`;
    }
    html += `<div>${esc(m.conteudo || '')}</div>`;
    html += `<div class="ts">${new Date(m.criado_em).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</div>`;
    if (m.remetente === 'suellen') {
      html += `<div class="checks ${m.lida ? 'lida' : ''}" data-msg-id="${m.id}">${m.lida ? '✓✓' : '✓'}</div>`;
    }
    d.innerHTML = html;
    return d;
  }

  function renderPerfil() {
    if (!conversaAtual || !usuarioAtual) return;
    document.getElementById('perfilEmpty').style.display = 'none';
    document.getElementById('perfilContent').style.display = 'block';
    document.getElementById('pNome').textContent = usuarioAtual.nome || '(sem nome)';
    document.getElementById('pTel').textContent = usuarioAtual.telefone || '—';
    document.getElementById('pPlano').textContent = usuarioAtual.plano || 'gratuito';

    const ehPrio = conversaAtual.plano_chat === 'prioritario' && new Date(conversaAtual.prioritario_expira_em) > new Date();
    document.getElementById('pPlanoChat').textContent = ehPrio ? '🟡 Prioritário' : '⚪ Basic';
    document.getElementById('bInteracoes').style.display = ehPrio ? 'block' : 'none';
    document.getElementById('bExpira').style.display = ehPrio ? 'block' : 'none';
    if (ehPrio) {
      document.getElementById('pInteracoes').textContent = conversaAtual.interacoes_restantes;
      document.getElementById('pExpira').textContent = new Date(conversaAtual.prioritario_expira_em).toLocaleString('pt-BR');
    }
    document.getElementById('pStatus').textContent = conversaAtual.bloqueada ? '🚫 Bloqueada' : '✓ Ativa';
    document.getElementById('btnFavTxt').textContent = conversaAtual.favoritada ? 'Desfavoritar' : 'Favoritar';
  }

  function setIdent(qual) {
    identidade = qual;
    document.getElementById('btnSuellen').classList.toggle('active', qual === 'suellen');
    document.getElementById('btnEquipe').classList.toggle('active', qual === 'equipe');
  }

  async function enviar() {
    if (!conversaAtual) return;
    const input = document.getElementById('inputMsg');
    const txt = input.value.trim();
    if (!txt) return;
    document.getElementById('btnEnviar').disabled = true;
    const d = await api('/api/atendimento/chat/mensagem', 'POST', {
      conversa_id: conversaAtual.id,
      conteudo: txt,
      tipo: 'texto',
      identidade,
    });
    document.getElementById('btnEnviar').disabled = false;
    if (d && d.mensagem) {
      input.value = '';
      const el = document.getElementById('chatMsgs');
      const empty = el.querySelector('.chat-empty');
      if (empty) empty.remove();
      el.appendChild(montarBolha(d.mensagem));
      el.scrollTop = el.scrollHeight;
      carregar();
    }
  }

  async function acao(corpo) {
    if (!conversaAtual) return;
    const d = await api('/api/atendimento/chat/acao', 'POST', { conversa_id: conversaAtual.id, ...corpo });
    if (d && d.success) {
      await abrirConversa(conversaAtual.id);
      await carregar();
    } else if (d && d.error) {
      alert(d.error);
    }
  }

  async function acaoFavoritar() {
    if (!conversaAtual) return;
    const novo = !conversaAtual.favoritada;
    await api('/api/atendimento/chat/favoritar', 'POST', { conversa_id: conversaAtual.id, favoritada: novo });
    await abrirConversa(conversaAtual.id);
    await carregar();
  }

  function acaoCortesia() { if (confirm('Dar cortesia? (24h prioritário, 30 interações)')) acao({ acao: 'cortesia' }); }
  function acaoAjustar() { const v = prompt('Quantas interações?'); if (v != null) acao({ acao: 'ajustar_interacoes', valor: parseInt(v) || 0 }); }
  function acaoEstender() { const v = prompt('Estender por quantas horas?', '24'); if (v != null) acao({ acao: 'estender_prioritario', valor: parseInt(v) || 24 }); }
  function acaoRebaixar() { if (confirm('Rebaixar para basic?')) acao({ acao: 'rebaixar_basic' }); }
  function acaoBloquear() { if (confirm('Bloquear conversa?')) acao({ acao: 'bloquear' }); }
  function acaoDesbloquear() { acao({ acao: 'desbloquear' }); }

  // ── WEBSOCKET ──
  function conectarWs() {
    if (ws && ws.readyState <= 1) return;
    if (!basicToken) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/chat?token=${basicToken}&modo=atendimento`);
    ws.onopen = () => setWs(true);
    ws.onclose = () => { setWs(false); setTimeout(conectarWs, 4000); };
    ws.onerror = () => setWs(false);
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.evento === 'nova_mensagem' && data.mensagem) {
          if (conversaAtual && data.conversa_id === conversaAtual.id) {
            const el = document.getElementById('chatMsgs');
            const empty = el.querySelector('.chat-empty');
            if (empty) empty.remove();
            el.appendChild(montarBolha(data.mensagem));
            el.scrollTop = el.scrollHeight;
          }
          carregar();
        }
        if (data.evento === 'mensagens_lidas' && data.por === 'aluna' && Array.isArray(data.ids)) {
          data.ids.forEach(id => {
            const checks = document.querySelector(`.checks[data-msg-id="${id}"]`);
            if (checks) {
              checks.classList.add('lida');
              checks.textContent = '✓✓';
            }
          });
        }
      } catch (_) {}
    };
  }

  function setWs(on) {
    const el = document.getElementById('wsPill');
    el.className = 'ws-pill ' + (on ? 'on' : 'off');
    el.textContent = on ? 'online' : 'offline';
  }

  function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function tempoRel(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'agora';
    if (diff < 3600) return Math.floor(diff/60) + 'min';
    if (diff < 86400) return Math.floor(diff/3600) + 'h';
    if (diff < 604800) return Math.floor(diff/86400) + 'd';
    if (diff < 2592000) return Math.floor(diff/604800) + 'sem';
    if (diff < 31536000) return Math.floor(diff/2592000) + 'mês';
    return Math.floor(diff/31536000) + 'a';
  }
</script>
