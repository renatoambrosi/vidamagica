<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Teclado</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    textarea {
      width: 100%;
      max-width: 500px;
      height: 100px;
      font-size: 16px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    p { color: #666; }
  </style>
</head>
<body>
  <h2>Teste do teclado iOS</h2>
  <p>Toque no campo abaixo e veja se a barra preta aparece:</p>
  <textarea placeholder="Escreva aqui..." autocomplete="off"></textarea>
  <p style="margin-top:30px"><strong>Versão:</strong> mínima, sem nada além disso.</p>
</body>
</html>
