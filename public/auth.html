<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Vida Mágica</title>
  <link rel="icon" href="/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:        #C8922A;
      --gold-light:  #E8C97A;
      --gold-deep:   #A17523;
      --gold-pale:   #F4D998;
      --dark:        #0D0800;
      --dark-2:      #1A1205;
      --pearl:       #F5F0E8;
      --muted:       rgba(245,240,232,0.45);
      --faint:       rgba(245,240,232,0.18);
      --border:      rgba(200,146,42,0.25);
      --border-hi:   rgba(200,146,42,0.6);
      --glow:        0 0 32px rgba(200,146,42,0.22), 0 0 80px rgba(200,146,42,0.08);
      --radius:      12px;
      --font-h:      'Montserrat', sans-serif;
      --font-b:      'Lora', Georgia, serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-b);
      background: var(--dark);
      color: var(--pearl);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('assets/background-theme.jpg');
      background-size: cover; background-position: center top;
    }
    .bg-layer::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(13,8,0,0.82) 0%, rgba(26,18,5,0.88) 100%);
    }
    .particles { position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
    .p { position:absolute; border-radius:50%; opacity:0; animation:rise linear infinite; }
    @keyframes rise {
      0%   { transform:translateY(110vh) scale(0); opacity:0; }
      8%   { opacity:0.7; }
      90%  { opacity:0.3; }
      100% { transform:translateY(-8vh) scale(1.4); opacity:0; }
    }
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 1.5rem; height:56px;
      background:rgba(13,8,0,0.9); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo { height:30px; width:auto; }
    .nav-link {
      font-family:var(--font-h); font-size:0.72rem; font-weight:700;
      letter-spacing:0.1em; text-transform:uppercase;
      color:var(--gold); text-decoration:none;
      border:1px solid var(--border); border-radius:999px;
      padding:0.38rem 1.1rem; transition:all 0.2s;
    }
    .nav-link:hover { background:rgba(200,146,42,0.1); border-color:var(--gold); }
    .page {
      position:relative; z-index:10; min-height:100dvh;
      display:flex; align-items:center; justify-content:center;
      padding:80px 1.25rem 3rem;
    }
    .card {
      width:100%; max-width:420px;
      background:rgba(13,8,0,0.75); backdrop-filter:blur(24px);
      border:1.5px solid var(--border); border-radius:20px;
      padding:2.5rem 2.25rem;
      box-shadow:var(--glow), 0 32px 80px rgba(0,0,0,0.55);
    }
    .card-logo { text-align:center; margin-bottom:2rem; }
    .card-logo img {
      height:60px; width:auto;
      filter:drop-shadow(0 0 16px rgba(200,146,42,0.55));
    }
    .tela { display:none; animation:fadeUp 0.3s ease; }
    .tela.ativa { display:block; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .titulo {
      font-family:var(--font-h); font-size:1.25rem; font-weight:900;
      text-transform:uppercase; letter-spacing:0.01em;
      color:var(--pearl); text-align:center; margin-bottom:0.35rem;
    }
    .titulo em { font-style:normal; color:var(--gold-light); }
    .subtitulo {
      font-size:0.82rem; color:var(--muted);
      text-align:center; line-height:1.6; margin-bottom:1.75rem;
    }
    .divisor {
      width:40px; height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      margin:0 auto 1.75rem;
    }
    .campo { margin-bottom:1.1rem; }
    .campo label {
      display:block; font-family:var(--font-h);
      font-size:0.62rem; font-weight:800;
      letter-spacing:0.18em; text-transform:uppercase;
      color:var(--gold); margin-bottom:0.5rem;
    }
    .tel-wrap { display:flex; }
    .tel-prefix {
      height:50px; padding:0 1rem;
      background:rgba(200,146,42,0.08);
      border:1.5px solid var(--border); border-right:none;
      border-radius:var(--radius) 0 0 var(--radius);
      display:flex; align-items:center;
      font-family:var(--font-h); font-size:0.82rem;
      color:var(--gold-light); white-space:nowrap; flex-shrink:0;
    }
    .tel-wrap input {
      flex:1; height:50px; padding:0 1.1rem;
      background:rgba(255,255,255,0.04);
      border:1.5px solid var(--border);
      border-radius:0 var(--radius) var(--radius) 0;
      font-family:var(--font-b); font-size:0.95rem;
      color:var(--pearl); outline:none; transition:all 0.2s;
      -webkit-appearance:none;
    }
    .tel-wrap input::placeholder { color:var(--faint); }
    .tel-wrap input:focus {
      border-color:var(--gold); border-left:1.5px solid var(--gold);
      background:rgba(200,146,42,0.06);
      box-shadow:0 0 0 3px rgba(200,146,42,0.1);
    }
    .otp-info {
      font-size:0.8rem; color:var(--muted);
      text-align:center; margin-bottom:1.5rem; line-height:1.5;
    }
    .otp-info strong { color:var(--gold-light); }
    .otp-row {
      display:flex; gap:8px; justify-content:center;
      margin-bottom:1.5rem;
    }
    .otp-box {
      width:46px; height:58px;
      background:rgba(255,255,255,0.04);
      border:1.5px solid var(--border); border-radius:var(--radius);
      text-align:center; font-family:var(--font-h);
      font-size:1.5rem; font-weight:800; color:var(--gold-light);
      outline:none; transition:all 0.2s; caret-color:var(--gold);
    }
    .otp-box:focus {
      border-color:var(--gold); background:rgba(200,146,42,0.08);
      box-shadow:0 0 0 3px rgba(200,146,42,0.12);
    }
    @media(max-width:400px) { .otp-box { width:38px; height:50px; font-size:1.25rem; } }
    .btn-cta {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; height:52px; padding:0 1.25rem;
      border-radius:var(--radius); border:none;
      background:var(--gold); color:var(--dark);
      font-family:var(--font-h); font-size:0.88rem; font-weight:800;
      letter-spacing:0.03em; text-transform:uppercase;
      cursor:pointer; transition:background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top:0.75rem;
    }
    .btn-cta:hover { background:#b07c22; transform:translateY(-1px); box-shadow:0 6px 20px rgba(200,146,42,0.3); }
    .btn-cta:active { transform:translateY(0); }
    .btn-cta:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-arrow {
      width:30px; height:30px; border-radius:50%;
      background:rgba(26,18,5,0.22);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .btn-arrow svg { width:13px; height:13px; stroke:var(--dark); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .spin {
      width:16px; height:16px;
      border:2px solid rgba(26,18,5,0.25); border-top-color:var(--dark);
      border-radius:50%; animation:giro 0.6s linear infinite;
    }
    @keyframes giro { to { transform:rotate(360deg); } }
    .reenvio {
      text-align:center; margin-top:0.75rem;
      font-size:0.78rem; color:var(--muted);
      display:flex; align-items:center; justify-content:center; gap:0.5rem;
    }
    .btn-sec {
      background:none; border:none; cursor:pointer;
      font-family:var(--font-b); font-size:0.78rem;
      color:var(--gold); text-decoration:underline;
      text-underline-offset:3px; padding:0; transition:color 0.2s;
    }
    .btn-sec:hover { color:var(--gold-light); }
    .msg {
      border-radius:8px; padding:0.65rem 0.9rem;
      font-size:0.8rem; line-height:1.5;
      margin-bottom:1rem; display:none;
    }
    .msg.show { display:block; }
    .msg.erro { background:rgba(185,64,64,0.15); border:1px solid rgba(185,64,64,0.35); color:#f4a5a5; }
    .msg.ok   { background:rgba(46,125,50,0.15); border:1px solid rgba(46,125,50,0.35); color:#a5d6a7; }
    .card-foot {
      margin-top:1.75rem; text-align:center;
      font-size:0.75rem; color:var(--faint);
    }
    .card-foot a, .card-foot button {
      background:none; border:none; cursor:pointer;
      font-family:var(--font-b); font-size:0.75rem;
      color:var(--gold); text-decoration:underline;
      text-underline-offset:3px; padding:0;
    }
    @media(max-width:480px) { .card { padding:2rem 1.5rem; } }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="particles" id="particles"></div>

<nav>
  <img src="assets/logo-horizontal.png" alt="Vida Mágica" class="nav-logo">
  <a href="/" class="nav-link">← Início</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-logo">
      <img src="assets/logo-vertical.png" alt="Vida Mágica">
    </div>

    <!-- STEP 1: TELEFONE -->
    <div class="tela ativa" id="tela-tel">
      <p class="titulo">Bem-vinda <em>de volta</em></p>
      <p class="subtitulo">Digite seu WhatsApp para receber<br>seu código de acesso.</p>
      <div class="divisor"></div>

      <div class="msg erro" id="erro-tel"></div>

      <div class="campo">
        <label>Número do WhatsApp</label>
        <div class="tel-wrap">
          <div class="tel-prefix">🇧🇷 +55</div>
          <input
            id="input-tel"
            type="tel" inputmode="numeric"
            placeholder="(11) 99999-9999"
            maxlength="15" autocomplete="tel"
          >
        </div>
      </div>

      <button class="btn-cta" id="btn-tel" onclick="enviarOTP()">
        <span>Receber código</span>
        <span class="btn-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </button>

      <div class="card-foot">
        Primeira vez aqui? <button onclick="irCadastro()">Criar conta</button>
      </div>
    </div>

    <!-- STEP 2: OTP -->
    <div class="tela" id="tela-otp">
      <p class="titulo">Código de <em>acesso</em></p>
      <div class="divisor"></div>

      <p class="otp-info">
        Enviamos um código para<br>
        <strong id="tel-exibido"></strong>
      </p>

      <div class="msg erro" id="erro-otp"></div>
      <div class="msg ok"   id="ok-otp"></div>

      <div class="otp-row">
        <input class="otp-box" id="o0" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-box" id="o1" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-box" id="o2" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-box" id="o3" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-box" id="o4" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-box" id="o5" maxlength="1" inputmode="numeric" type="text">
      </div>

      <button class="btn-cta" id="btn-otp" onclick="verificarOTP()">
        <span>Entrar</span>
        <span class="btn-arrow">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </button>

      <div class="reenvio">
        <span>Não chegou?</span>
        <button class="btn-sec" id="btn-reenviar" onclick="reenviarOTP()">Reenviar código</button>
        <span id="timer-reenvio"></span>
      </div>

      <div class="card-foot" style="margin-top:1rem">
        <button onclick="voltarTel()">← Trocar número</button>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let telefoneFormatado = '';
let timerInterval = null;

// partículas
(function () {
  const c = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'p';
    const s = Math.random() * 4 + 2;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*16+9}s;animation-delay:${Math.random()*14}s;background:${Math.random()>.5?'rgba(248,220,150,0.7)':'rgba(255,255,255,0.55)'};`;
    c.appendChild(p);
  }
})();

// máscara tel
document.getElementById('input-tel').addEventListener('input', function () {
  let v = this.value.replace(/\D/g,'').substring(0,11);
  if (v.length >= 7)      v = `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`;
  else if (v.length >= 3) v = `(${v.substring(0,2)}) ${v.substring(2)}`;
  else if (v.length >= 1) v = `(${v}`;
  this.value = v;
});
document.getElementById('input-tel').addEventListener('keydown', e => { if (e.key === 'Enter') enviarOTP(); });

// OTP boxes
for (let i = 0; i < 6; i++) {
  const box = document.getElementById(`o${i}`);
  box.addEventListener('input', function () {
    const val = this.value.replace(/\D/g,'');
    this.value = val.slice(-1);
    if (val && i < 5) document.getElementById(`o${i+1}`).focus();
    if (i === 5 && val) verificarOTP();
  });
  box.addEventListener('paste', function (e) {
    e.preventDefault();
    const text = e.clipboardData.getData('text').replace(/\D/g,'').substring(0,6);
    for (let j = 0; j < text.length; j++) {
      const b = document.getElementById(`o${j}`);
      if (b) b.value = text[j];
    }
    if (text.length === 6) verificarOTP();
    else document.getElementById(`o${Math.min(text.length,5)}`).focus();
  });
  box.addEventListener('keydown', function (e) {
    if (e.key === 'Backspace' && !this.value && i > 0) document.getElementById(`o${i-1}`).focus();
  });
}

function limparTel(v) { const d = v.replace(/\D/g,''); return d.startsWith('55') ? d : `55${d}`; }
function exibirTel(v) {
  const d = v.replace(/\D/g,'').slice(-11);
  return d.length >= 11 ? `(${d.substring(0,2)}) ${d.substring(2,7)}-${d.substring(7)}` : `+55 ${v}`;
}
function getOTP() { return [0,1,2,3,4,5].map(i => document.getElementById(`o${i}`).value).join(''); }
function limparOTP() { for (let i=0;i<6;i++) document.getElementById(`o${i}`).value=''; }

function mostrarErro(id, msg) { const e = document.getElementById(id); e.textContent = msg; e.className = 'msg erro show'; }
function mostrarOk(id, msg)   { const e = document.getElementById(id); e.textContent = msg; e.className = 'msg ok show'; }
function limparMsg(id) { document.getElementById(id).className = 'msg'; }

function setLoading(id, label) {
  const b = document.getElementById(id);
  b.disabled = true;
  b.innerHTML = `<span>${label}</span><span class="btn-arrow"><div class="spin"></div></span>`;
}
function resetBtn(id, label) {
  const b = document.getElementById(id);
  b.disabled = false;
  b.innerHTML = `<span>${label}</span><span class="btn-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>`;
}

function irTela(id) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function irCadastro() { window.location.href = '/cadastro'; }
function voltarTel()  { clearInterval(timerInterval); limparOTP(); limparMsg('erro-otp'); limparMsg('ok-otp'); irTela('tela-tel'); }

function iniciarTimer(seg = 60) {
  const btn = document.getElementById('btn-reenviar');
  const timer = document.getElementById('timer-reenvio');
  btn.disabled = true; btn.style.opacity = '0.35';
  let t = seg;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer.textContent = `(${t}s)`;
    t--;
    if (t < 0) { clearInterval(timerInterval); timer.textContent = ''; btn.disabled = false; btn.style.opacity = '1'; }
  }, 1000);
}

async function enviarOTP() {
  limparMsg('erro-tel');
  const rawTel = document.getElementById('input-tel').value;
  const tel = limparTel(rawTel);
  if (tel.replace('55','').length < 10) { mostrarErro('erro-tel','Digite um número de WhatsApp válido com DDD.'); return; }
  telefoneFormatado = tel;
  setLoading('btn-tel', 'Enviando código…');
  try {
    const r = await fetch(`${API}/api/auth/solicitar-otp`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telefone: tel })
    });
    const d = await r.json();
    if (r.ok) {
      document.getElementById('tel-exibido').textContent = exibirTel(rawTel);
      irTela('tela-otp');
      iniciarTimer(60);
      setTimeout(() => document.getElementById('o0').focus(), 300);
    } else {
      mostrarErro('erro-tel', d.error || 'Erro ao enviar código. Tente novamente.');
    }
  } catch { mostrarErro('erro-tel','Falha de conexão. Verifique sua internet.'); }
  finally { resetBtn('btn-tel','Receber código'); }
}

async function verificarOTP() {
  limparMsg('erro-otp');
  const codigo = getOTP();
  if (codigo.length < 6) { mostrarErro('erro-otp','Digite o código completo de 6 dígitos.'); return; }
  setLoading('btn-otp','Verificando…');
  try {
    const r = await fetch(`${API}/api/auth/verificar-otp`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telefone: telefoneFormatado, codigo })
    });
    const d = await r.json();
    if (r.ok) {
      localStorage.setItem('vm_access',  d.access_token);
      localStorage.setItem('vm_refresh', d.refresh_token);
      if (d.novo_usuario) {
        // Nunca deveria cair aqui no login, mas por segurança:
        window.location.href = '/cadastro';
      } else {
        window.location.href = '/app';
      }
    } else {
      mostrarErro('erro-otp', d.error || 'Código inválido ou expirado.');
      limparOTP(); document.getElementById('o0').focus();
    }
  } catch { mostrarErro('erro-otp','Falha de conexão. Tente novamente.'); }
  finally { resetBtn('btn-otp','Entrar'); }
}

async function reenviarOTP() {
  limparMsg('erro-otp');
  try {
    await fetch(`${API}/api/auth/solicitar-otp`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ telefone: telefoneFormatado })
    });
    mostrarOk('ok-otp','✅ Novo código enviado! Verifique seu WhatsApp.');
    iniciarTimer(60);
  } catch { mostrarErro('erro-otp','Erro ao reenviar. Tente novamente.'); }
}

// auto-login
(async function () {
  const t = localStorage.getItem('vm_access');
  if (!t) return;
  try { const r = await fetch(`${API}/api/auth/me`, { headers:{'Authorization':`Bearer ${t}`} }); if (r.ok) window.location.href = '/app'; } catch {}
})();
</script>
</body>
</html>
