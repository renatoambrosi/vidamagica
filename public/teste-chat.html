<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Aluna — Vida Mágica (Teste)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #faf8f2; color: #2d2a1e; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: linear-gradient(135deg, #8B6914, #C9A84C); color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    header h1 { font-size: 1rem; font-weight: 600; }
    .login-status { font-size: 12px; opacity: 0.9; }
    .ws-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 6px; }
    .ws-dot.on { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .ws-dot.off { background: #ef4444; }

    .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-overlay.hidden { display: none; }
    .login-box { background: #fff; padding: 28px; border-radius: 14px; width: 90%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .login-box h2 { margin-bottom: 6px; color: #8B6914; }
    .login-box p { color: #888; font-size: 13px; margin-bottom: 18px; }
    .login-box input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; font-family: inherit; }
    .login-box button { width: 100%; padding: 11px; background: linear-gradient(135deg, #8B6914, #C9A84C); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; margin-top: 6px; }
    .login-box .step { display: none; }
    .login-box .step.active { display: block; }

    main { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; padding: 20px; gap: 14px; }
    .status-bar { background: #fff; border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #6b6347; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge.free { background: #f3f4f6; color: #6b7280; }
    .badge.basic { background: #dbeafe; color: #1e40af; }
    .badge.prio { background: #fef3c7; color: #b45309; }

    .msgs { flex: 1; background: #fff; border: 1px solid rgba(201,168,76,0.15); border-radius: 12px; padding: 16px; overflow-y: auto; min-height: 380px; max-height: 60vh; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.45; word-wrap: break-word; position: relative; }
    .msg.aluna { align-self: flex-end; background: linear-gradient(135deg, #C9A84C, #E8D5A3); color: #2d2a1e; border-bottom-right-radius: 4px; }
    .msg.suellen { align-self: flex-start; background: #f5f2e8; color: #2d2a1e; border-bottom-left-radius: 4px; }
    .msg .quem { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.7; }
    .msg .checks { font-size: 11px; margin-top: 4px; text-align: right; opacity: 0.6; }
    .msg .checks.lida { color: #C9A84C; opacity: 1; }
    .empty { text-align: center; color: #aaa; padding: 60px 20px; font-style: italic; }

    .composer { display: flex; gap: 8px; padding: 12px; background: #fff; border: 1px solid rgba(201,168,76,0.2); border-radius: 12px; }
    .composer input { flex: 1; padding: 10px 14px; border: 1px solid #e5e0c8; border-radius: 8px; font-family: inherit; font-size: 15px; }
    .composer input:focus { outline: none; border-color: #C9A84C; }
    .composer button { padding: 10px 22px; background: linear-gradient(135deg, #8B6914, #C9A84C); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>Entrar como aluna</h2>
    <p>Use seu telefone cadastrado para receber o código no WhatsApp.</p>

    <div class="step active" id="step1">
      <input id="loginTel" placeholder="62983086320" />
      <button onclick="solicitarOTP()">Enviar código</button>
    </div>

    <div class="step" id="step2">
      <p style="color:#8BA75F">✓ Código enviado pro WhatsApp</p>
      <input id="loginCodigo" placeholder="123456" maxlength="6" />
      <button onclick="validarOTP()">Entrar</button>
      <button style="background:#eee;color:#888;margin-top:8px;font-weight:400" onclick="resetLogin()">Voltar</button>
    </div>
  </div>
</div>

<header>
  <h1>💬 Chat com Atendimento</h1>
  <div class="login-status">
    <span class="ws-dot off" id="wsDot"></span>
    <span id="wsStatus">desconectado</span>
    <button onclick="logout()" style="margin-left:12px;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px">Sair</button>
  </div>
</header>

<main>
  <div class="status-bar">
    <div>
      <strong id="meuNome">—</strong>
      <span style="color:#999">·</span>
      <span id="meuTel" style="font-family:monospace;font-size:12px">—</span>
    </div>
    <div>
      Plano:
      <span id="planoBadge" class="badge free">free</span>
      <span id="planoDetalhe" style="margin-left:6px;font-size:11px;color:#888"></span>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="empty" id="emptyMsg">Carregando conversa...</div>
  </div>

  <div class="composer">
    <input id="inputMsg" placeholder="Digite sua mensagem..." onkeydown="if(event.key==='Enter')enviar()" />
    <button onclick="enviar()" id="btnEnviar">Enviar</button>
  </div>
</main>

<script>
  let access_token = sessionStorage.getItem('vm_access') || '';
  let refresh_token = sessionStorage.getItem('vm_refresh') || '';
  let usuario = JSON.parse(sessionStorage.getItem('vm_usuario') || 'null');
  let ws = null;
  let device_id = sessionStorage.getItem('vm_device') || ('chat-teste-' + Date.now());
  sessionStorage.setItem('vm_device', device_id);

  // ── INIT ──
  if (access_token && usuario) {
    document.getElementById('loginOverlay').classList.add('hidden');
    iniciar();
  }

  // ── LOGIN ──
  async function solicitarOTP() {
    const tel = document.getElementById('loginTel').value.trim();
    if (!tel) return alert('Digite um telefone');
    const r = await fetch('/api/auth/otp/solicitar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telefone: tel })
    });
    const d = await r.json();
    if (!r.ok) return alert(d.error || 'Erro');
    sessionStorage.setItem('vm_login_tel', tel);
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
  }

  async function validarOTP() {
    const tel = sessionStorage.getItem('vm_login_tel');
    const codigo = document.getElementById('loginCodigo').value.trim();
    const r = await fetch('/api/auth/otp/validar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telefone: tel, codigo, device_id, tipo: 'desktop' })
    });
    const d = await r.json();
    if (!r.ok) return alert(d.error || 'Código inválido');
    access_token = d.access_token;
    refresh_token = d.refresh_token;
    usuario = d.usuario;
    sessionStorage.setItem('vm_access', access_token);
    sessionStorage.setItem('vm_refresh', refresh_token);
    sessionStorage.setItem('vm_usuario', JSON.stringify(usuario));
    document.getElementById('loginOverlay').classList.add('hidden');
    iniciar();
  }

  function resetLogin() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
  }

  function logout() {
    sessionStorage.clear();
    location.reload();
  }

  // ── INIT POST-LOGIN ──
  async function iniciar() {
    document.getElementById('meuNome').textContent = usuario.nome || 'Sem nome';
    document.getElementById('meuTel').textContent = usuario.telefone;
    await carregarConversa();
    conectarWs();
  }

  async function api(path, method = 'GET', body = null) {
    const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + access_token };
    const opt = { method, headers };
    if (body) opt.body = JSON.stringify(body);
    let r = await fetch(path, opt);
    if (r.status === 401) {
      // tenta refresh
      const rr = await fetch('/api/auth/refresh', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token })
      });
      if (rr.ok) {
        const dd = await rr.json();
        access_token = dd.access_token;
        sessionStorage.setItem('vm_access', access_token);
        opt.headers['Authorization'] = 'Bearer ' + access_token;
        r = await fetch(path, opt);
      } else {
        logout();
        return null;
      }
    }
    return await r.json().catch(() => ({}));
  }

  async function carregarConversa() {
    const d = await api('/api/chat/conversa');
    if (!d) return;
    renderPlano(d.tipo_plano, d.conversa);
    renderMensagens(d.mensagens || []);
  }

  function renderPlano(tipo, conversa) {
    const badge = document.getElementById('planoBadge');
    const det = document.getElementById('planoDetalhe');
    badge.className = 'badge ' + (tipo === 'prioritario' ? 'prio' : tipo === 'basic_vm' ? 'basic' : 'free');
    badge.textContent = tipo === 'prioritario' ? 'prioritário' : tipo === 'basic_vm' ? 'basic' : 'free';
    if (tipo === 'prioritario') {
      det.textContent = `${conversa.interacoes_restantes} interações · expira ${new Date(conversa.prioritario_expira_em).toLocaleString('pt-BR')}`;
    } else if (tipo === 'basic_vm') {
      det.textContent = 'resposta em até 5 dias';
    } else {
      det.textContent = 'resposta indeterminada';
    }
  }

  function renderMensagens(msgs) {
    const el = document.getElementById('msgs');
    if (!msgs.length) {
      el.innerHTML = '<div class="empty">Nenhuma mensagem ainda. Mande a primeira!</div>';
      return;
    }
    el.innerHTML = '';
    msgs.forEach(m => el.appendChild(montarBolha(m)));
    el.scrollTop = el.scrollHeight;
  }

  function montarBolha(m) {
    const d = document.createElement('div');
    d.className = 'msg ' + (m.remetente === 'aluna' ? 'aluna' : 'suellen');
    d.dataset.id = m.id;
    let html = '';
    if (m.remetente === 'suellen') {
      html += `<div class="quem">${m.identidade === 'equipe' ? '⭐ Equipe Vida Mágica' : '✨ Suellen'}</div>`;
    }
    html += `<div>${escHtml(m.conteudo || '')}</div>`;
    if (m.remetente === 'aluna') {
      html += `<div class="checks ${m.lida ? 'lida' : ''}" data-msg-id="${m.id}">${m.lida ? '✓✓' : '✓'}</div>`;
    }
    d.innerHTML = html;
    return d;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function enviar() {
    const input = document.getElementById('inputMsg');
    const txt = input.value.trim();
    if (!txt) return;
    document.getElementById('btnEnviar').disabled = true;
    const d = await api('/api/chat/mensagem', 'POST', { conteudo: txt, tipo: 'texto' });
    document.getElementById('btnEnviar').disabled = false;
    if (d && d.mensagem) {
      input.value = '';
      const el = document.getElementById('msgs');
      const empty = document.getElementById('emptyMsg');
      if (empty) empty.remove();
      el.appendChild(montarBolha(d.mensagem));
      el.scrollTop = el.scrollHeight;
      // refresh status do plano (prioritário decrementa)
      const s = await api('/api/chat/status');
      if (s && s.tipo_plano) renderPlano(s.tipo_plano, { interacoes_restantes: s.interacoes_restantes, prioritario_expira_em: s.prioritario_expira_em });
    }
  }

  // ── WEBSOCKET ──
  function conectarWs() {
    if (ws && ws.readyState <= 1) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/chat?token=${access_token}&modo=aluna`);

    ws.onopen = () => setWs(true);
    ws.onclose = () => { setWs(false); setTimeout(conectarWs, 4000); };
    ws.onerror = () => setWs(false);
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.evento === 'nova_mensagem' && data.mensagem) {
          const el = document.getElementById('msgs');
          const empty = document.getElementById('emptyMsg');
          if (empty) empty.remove();
          el.appendChild(montarBolha(data.mensagem));
          el.scrollTop = el.scrollHeight;
        }
        if (data.evento === 'mensagens_lidas' && data.por === 'suellen' && Array.isArray(data.ids)) {
          data.ids.forEach(id => {
            const checks = document.querySelector(`.checks[data-msg-id="${id}"]`);
            if (checks) {
              checks.classList.add('lida');
              checks.textContent = '✓✓';
            }
          });
        }
      } catch (_) {}
    };
  }

  function setWs(on) {
    document.getElementById('wsDot').className = 'ws-dot ' + (on ? 'on' : 'off');
    document.getElementById('wsStatus').textContent = on ? 'conectado' : 'desconectado';
  }
</script>
</body>
</html>
