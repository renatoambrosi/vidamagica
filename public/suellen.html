<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0800">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VM Atendimento">
  <title>Vida Mágica — Atendimento</title>
  <link rel="icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
/* ════════════════════════════════════════════════
   VIDA MÁGICA — Painel Suellen
   Tema: dark premium, ouro, estilo WhatsApp nativo
   ════════════════════════════════════════════════ */
:root {
  --ouro:       #C8922A;
  --ouro-cl:    #E8C97A;
  --ouro-f:     #A17523;
  --ouro-film:  rgba(200,146,42,0.12);
  --ouro-brd:   rgba(200,146,42,0.18);
  --ouro-brd2:  rgba(200,146,42,0.4);

  --bg:    #0D0800;
  --bg2:   #130C00;
  --bg3:   #1A1100;
  --surf:  rgba(255,255,255,0.04);
  --surf2: rgba(255,255,255,0.07);

  --txt:   #F5F0E8;
  --txt2:  rgba(245,240,232,0.55);
  --txt3:  rgba(245,240,232,0.28);

  --verde: #25D366;
  --red:   #EF4444;
  --prior: #F4D060;

  --font-d: 'Montserrat', sans-serif;
  --font-b: 'Open Sans', sans-serif;

  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-full: 9999px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--txt); font-family:var(--font-b); -webkit-font-smoothing:antialiased; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }

/* ════════ LAYOUT RAIZ ════════ */
#app { position:fixed; inset:0; display:flex; flex-direction:column; }

/* ════════ TELA — abstração ════════ */
.tela { position:absolute; inset:0; display:flex; flex-direction:column; background:var(--bg); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); will-change:transform; }
.tela.fora-direita { transform:translateX(100%); }
.tela.fora-esquerda { transform:translateX(-30%); opacity:0.5; }
.tela.ativa { transform:translateX(0); opacity:1; }

/* ════════ HEADER GENÉRICO ════════ */
.header {
  flex-shrink:0;
  display:flex; align-items:center; gap:0.75rem;
  padding: calc(var(--safe-top) + 0.65rem) 1rem 0.65rem;
  background: rgba(13,8,0,0.96);
  border-bottom:1px solid var(--ouro-brd);
  backdrop-filter:blur(16px);
  min-height: calc(var(--safe-top) + 56px);
}
.header-btn { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:var(--r-full); transition:background 0.15s; flex-shrink:0; }
.header-btn:hover { background:var(--ouro-film); }
.header-btn svg { width:22px; height:22px; stroke:var(--txt2); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; transition:stroke 0.15s; }
.header-btn:hover svg { stroke:var(--ouro-cl); }
.header-titulo { font-family:var(--font-d); font-size:0.82rem; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:var(--ouro-cl); flex:1; }

/* ════════ TELA 1: LISTA ════════ */
#tela-lista .header-titulo { font-size:0.88rem; }

.lista-stats { display:flex; gap:0.5rem; padding:0.6rem 1rem; background:var(--bg2); border-bottom:1px solid var(--ouro-brd); flex-shrink:0; }
.stat-pill { font-family:var(--font-d); font-size:0.6rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:0.22rem 0.65rem; border-radius:var(--r-full); }
.stat-pill.aguardando { background:rgba(239,68,68,0.12); color:#F87171; border:1px solid rgba(239,68,68,0.2); }
.stat-pill.prior       { background:rgba(244,208,96,0.1);  color:var(--prior); border:1px solid rgba(244,208,96,0.2); }
.stat-pill.total       { background:var(--surf);            color:var(--txt2);  border:1px solid var(--ouro-brd); }

.conversas-scroll { flex:1; overflow-y:auto; }
.conversas-scroll::-webkit-scrollbar { width:3px; }
.conversas-scroll::-webkit-scrollbar-thumb { background:var(--ouro-brd); border-radius:2px; }

.conv-item {
  display:flex; align-items:center; gap:0.85rem;
  padding:0.85rem 1rem;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer; transition:background 0.12s;
  position:relative;
}
.conv-item:hover, .conv-item:active { background:var(--surf); }
.conv-item.prior-item { background:rgba(244,208,96,0.04); }
.conv-item.prior-item:hover { background:rgba(244,208,96,0.08); }

.conv-avatar { position:relative; flex-shrink:0; }
.conv-avatar-img { width:50px; height:50px; border-radius:50%; object-fit:cover; background:var(--bg3); border:1px solid var(--ouro-brd); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.conv-avatar-img svg { width:24px; height:24px; stroke:var(--txt3); }
.conv-avatar-img img { width:100%; height:100%; object-fit:cover; }
.conv-prior-badge { position:absolute; bottom:-2px; right:-2px; background:var(--prior); color:var(--bg); font-size:0.65rem; border-radius:50%; width:18px; height:18px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }

.conv-corpo { flex:1; min-width:0; }
.conv-nome { font-family:var(--font-d); font-size:0.88rem; font-weight:700; color:var(--txt); margin-bottom:0.2rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.conv-preview { font-size:0.78rem; color:var(--txt2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.conv-preview.nao-lida { color:var(--txt); font-weight:600; }

.conv-meta { flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; }
.conv-tempo { font-size:0.68rem; color:var(--txt3); }
.conv-badge { min-width:20px; height:20px; padding:0 6px; background:var(--ouro); color:var(--bg); border-radius:var(--r-full); font-family:var(--font-d); font-size:0.65rem; font-weight:800; display:flex; align-items:center; justify-content:center; }
.conv-badge.prior-badge { background:var(--prior); }

.lista-vazia { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.75rem; color:var(--txt3); padding:2rem; text-align:center; }
.lista-vazia-icon { font-size:2.5rem; opacity:0.4; }
.lista-vazia p { font-size:0.82rem; }

/* ════════ TELA 2: CHAT ════════ */
.chat-header-avatar { width:38px; height:38px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--bg3); border:1px solid var(--ouro-brd); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.chat-header-avatar svg { width:18px; height:18px; stroke:var(--txt3); }
.chat-header-avatar img { width:100%; height:100%; object-fit:cover; }
.chat-header-info { flex:1; min-width:0; cursor:pointer; }
.chat-header-nome { font-family:var(--font-d); font-size:0.88rem; font-weight:800; color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-header-status { font-size:0.65rem; color:var(--txt3); margin-top:1px; }
.chat-header-status.prior { color:var(--prior); font-weight:700; }

/* Mensagens */
.chat-msgs { flex:1; overflow-y:auto; padding:0.75rem 1rem; display:flex; flex-direction:column; gap:0.4rem; background:var(--bg); }
.chat-msgs::-webkit-scrollbar { width:3px; }
.chat-msgs::-webkit-scrollbar-thumb { background:var(--ouro-brd); border-radius:2px; }

.msg-wrap { display:flex; flex-direction:column; max-width:78%; position:relative; }
.msg-wrap.aluna   { align-self:flex-start; align-items:flex-start; }
.msg-wrap.suellen { align-self:flex-end;   align-items:flex-end; }

/* Bolha */
.msg-bolha {
  padding:0.55rem 0.85rem;
  border-radius:16px;
  font-size:0.9rem; line-height:1.5;
  word-break:break-word;
  position:relative;
  cursor:pointer;
  transition:opacity 0.15s;
  user-select:text;
}
.msg-bolha:active { opacity:0.8; }
.msg-wrap.aluna   .msg-bolha { background:var(--surf2); color:var(--txt); border-bottom-left-radius:3px; }
.msg-wrap.suellen .msg-bolha { background:linear-gradient(135deg, var(--ouro-f), var(--ouro)); color:white; border-bottom-right-radius:3px; }

/* Nome da aluna na bolha dela */
.msg-wrap.aluna .msg-bolha::before {
  content: attr(data-nome);
  display:block; font-family:var(--font-d); font-size:0.58rem; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase;
  color:var(--ouro-cl); margin-bottom:0.2rem;
}

/* Preview de reply na bolha */
.msg-reply-preview {
  background:rgba(255,255,255,0.08); border-left:3px solid var(--ouro);
  border-radius:6px; padding:0.35rem 0.6rem; margin-bottom:0.45rem;
  font-size:0.75rem; color:var(--txt2); line-height:1.35;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.msg-reply-preview .reply-autor { font-weight:700; color:var(--ouro-cl); display:block; font-size:0.68rem; margin-bottom:1px; }

.msg-hora { font-size:0.62rem; color:var(--txt3); padding:0 0.25rem; margin-top:2px; }
.msg-wrap.suellen .msg-hora { color:rgba(255,255,255,0.5); }

/* Imagem */
.msg-img { max-width:220px; border-radius:12px; overflow:hidden; cursor:pointer; }
.msg-img img { width:100%; display:block; }

/* Áudio */
.msg-audio audio { max-width:200px; height:36px; }

/* Separador data */
.msg-data-sep {
  align-self:center; margin:0.6rem 0;
  font-family:var(--font-d); font-size:0.6rem; font-weight:700;
  letter-spacing:0.1em; text-transform:uppercase;
  color:var(--txt3); background:var(--surf); border:1px solid var(--ouro-brd);
  padding:0.2rem 0.7rem; border-radius:var(--r-full);
}

/* Context menu ao segurar */
.msg-ctx-menu {
  position:fixed; z-index:200;
  background:var(--bg2); border:1px solid var(--ouro-brd);
  border-radius:var(--r-md); padding:0.35rem 0;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  min-width:140px;
  animation: ctx-aparece 0.15s ease;
}
@keyframes ctx-aparece { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
.msg-ctx-item { display:flex; align-items:center; gap:0.6rem; padding:0.6rem 1rem; font-size:0.82rem; color:var(--txt); cursor:pointer; transition:background 0.1s; }
.msg-ctx-item:hover { background:var(--surf2); }
.msg-ctx-item svg { width:16px; height:16px; stroke:var(--txt2); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

/* Reply bar acima do input */
.reply-bar {
  display:none; align-items:center; gap:0.75rem;
  padding:0.6rem 1rem;
  background:var(--bg2); border-top:1px solid var(--ouro-brd);
  flex-shrink:0;
}
.reply-bar.visivel { display:flex; }
.reply-bar-conteudo { flex:1; min-width:0; }
.reply-bar-autor { font-family:var(--font-d); font-size:0.65rem; font-weight:800; color:var(--ouro-cl); margin-bottom:2px; }
.reply-bar-texto { font-size:0.78rem; color:var(--txt2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.reply-bar-fechar { flex-shrink:0; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:var(--r-full); color:var(--txt3); font-size:1rem; transition:background 0.15s; }
.reply-bar-fechar:hover { background:var(--surf2); color:var(--txt); }

/* Input */
.chat-input-wrap { flex-shrink:0; padding:0.6rem 0.75rem calc(0.6rem + var(--safe-bottom)); background:rgba(13,8,0,0.96); border-top:1px solid var(--ouro-brd); }
.chat-input-row { display:flex; align-items:flex-end; gap:0.45rem; }
.btn-icone { flex-shrink:0; width:38px; height:38px; display:flex; align-items:center; justify-content:center; border-radius:var(--r-full); color:var(--txt2); transition:color 0.15s, background 0.15s; }
.btn-icone:hover { color:var(--ouro-cl); background:var(--ouro-film); }
.btn-icone svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-width:1.8; }
.chat-input-box { flex:1; }
.chat-input {
  width:100%; max-height:120px;
  background:var(--surf2); border:1px solid var(--ouro-brd);
  border-radius:22px; padding:0.55rem 1rem;
  font-family:var(--font-b); font-size:0.9rem; color:var(--txt);
  resize:none; outline:none; line-height:1.45;
  transition:border-color 0.2s;
}
.chat-input:focus { border-color:var(--ouro-brd2); }
.chat-input::placeholder { color:var(--txt3); }
.btn-enviar { flex-shrink:0; width:40px; height:40px; background:linear-gradient(135deg,var(--ouro-f),var(--ouro)); border-radius:var(--r-full); display:flex; align-items:center; justify-content:center; transition:transform 0.15s, opacity 0.15s; }
.btn-enviar:hover { transform:scale(1.06); }
.btn-enviar:active { transform:scale(0.95); }
.btn-enviar svg { width:16px; height:16px; fill:white; stroke:none; }

/* ════════ TELA 3: PERFIL DA ALUNA ════════ */
.perfil-scroll { flex:1; overflow-y:auto; }
.perfil-scroll::-webkit-scrollbar { width:3px; }
.perfil-scroll::-webkit-scrollbar-thumb { background:var(--ouro-brd); border-radius:2px; }

.perfil-hero { display:flex; flex-direction:column; align-items:center; padding:2rem 1.5rem 1.5rem; text-align:center; background:var(--bg2); border-bottom:1px solid var(--ouro-brd); }
.perfil-foto { width:80px; height:80px; border-radius:50%; background:var(--bg3); border:2px solid var(--ouro-brd2); overflow:hidden; display:flex; align-items:center; justify-content:center; margin-bottom:0.85rem; }
.perfil-foto svg { width:38px; height:38px; stroke:var(--txt3); }
.perfil-foto img { width:100%; height:100%; object-fit:cover; }
.perfil-nome { font-family:var(--font-d); font-size:1.1rem; font-weight:900; color:var(--txt); margin-bottom:0.2rem; }
.perfil-tel  { font-size:0.75rem; color:var(--txt2); margin-bottom:0.75rem; }
.perfil-tags { display:flex; gap:0.4rem; flex-wrap:wrap; justify-content:center; }
.tag-pill { font-family:var(--font-d); font-size:0.6rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:0.2rem 0.65rem; border-radius:var(--r-full); }
.tag-plano   { background:rgba(200,146,42,0.12); color:var(--ouro-cl); border:1px solid var(--ouro-brd2); }
.tag-prior   { background:rgba(244,208,96,0.1);  color:var(--prior);   border:1px solid rgba(244,208,96,0.3); }
.tag-basic   { background:var(--surf);            color:var(--txt2);    border:1px solid var(--ouro-brd); }
.tag-bloq    { background:rgba(239,68,68,0.1);   color:#F87171;        border:1px solid rgba(239,68,68,0.25); }

.perfil-secao { padding:1rem 1.25rem 0.5rem; }
.perfil-secao-titulo { font-family:var(--font-d); font-size:0.6rem; font-weight:800; letter-spacing:0.15em; text-transform:uppercase; color:var(--ouro-f); margin-bottom:0.65rem; }

.perfil-stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-bottom:0.5rem; }
.perfil-stat { background:var(--surf); border:1px solid var(--ouro-brd); border-radius:var(--r-md); padding:0.75rem; }
.perfil-stat-num { font-family:var(--font-d); font-size:1.4rem; font-weight:900; color:var(--ouro-cl); line-height:1; margin-bottom:2px; }
.perfil-stat-label { font-size:0.65rem; color:var(--txt2); }

.produto-item { display:flex; align-items:center; gap:0.75rem; padding:0.75rem; background:var(--surf); border:1px solid var(--ouro-brd); border-radius:var(--r-md); margin-bottom:0.45rem; }
.produto-icone { font-size:1.2rem; flex-shrink:0; }
.produto-nome { font-size:0.82rem; font-weight:600; color:var(--txt); }
.produto-link { margin-left:auto; font-family:var(--font-d); font-size:0.62rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--ouro); padding:0.25rem 0.65rem; border:1px solid var(--ouro-brd2); border-radius:var(--r-full); }

/* Chat prioritário info */
.prior-info-box { background:rgba(244,208,96,0.06); border:1px solid rgba(244,208,96,0.25); border-radius:var(--r-md); padding:0.9rem; margin-bottom:0.5rem; }
.prior-info-titulo { font-family:var(--font-d); font-size:0.7rem; font-weight:800; color:var(--prior); margin-bottom:0.5rem; }
.prior-info-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.3rem; }
.prior-info-label { font-size:0.72rem; color:var(--txt2); }
.prior-info-val { font-family:var(--font-d); font-size:0.75rem; font-weight:700; color:var(--txt); }
.prior-barra-wrap { margin-top:0.5rem; }
.prior-barra-bg { height:4px; background:rgba(244,208,96,0.15); border-radius:2px; overflow:hidden; }
.prior-barra-fill { height:100%; background:var(--prior); border-radius:2px; transition:width 0.5s ease; }

/* Ações superadmin */
.acoes-grid { display:flex; flex-direction:column; gap:0.45rem; }
.acao-btn { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; background:var(--surf); border:1px solid var(--ouro-brd); border-radius:var(--r-md); font-size:0.82rem; color:var(--txt); cursor:pointer; transition:background 0.15s, border-color 0.15s; width:100%; text-align:left; }
.acao-btn:hover { background:var(--surf2); border-color:var(--ouro-brd2); }
.acao-btn.danger { border-color:rgba(239,68,68,0.2); }
.acao-btn.danger:hover { background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.35); }
.acao-btn.success { border-color:rgba(37,211,102,0.2); }
.acao-btn.success:hover { background:rgba(37,211,102,0.06); border-color:rgba(37,211,102,0.35); }
.acao-btn svg { width:16px; height:16px; stroke:var(--txt2); flex-shrink:0; }
.acao-btn.danger svg { stroke:#F87171; }
.acao-btn.success svg { stroke:#4ADE80; }

/* Toast */
#toast { position:fixed; bottom:calc(1rem + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); z-index:999; padding:0.65rem 1.1rem; border-radius:var(--r-md); font-size:0.8rem; font-weight:600; opacity:0; transition:all 0.25s; pointer-events:none; white-space:nowrap; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.ok  { background:rgba(37,211,102,0.15); border:1px solid rgba(37,211,102,0.3); color:#4ADE80; }
#toast.err { background:rgba(239,68,68,0.15);  border:1px solid rgba(239,68,68,0.3);  color:#F87171; }

/* Loading dots */
.loading-dots { display:flex; gap:5px; align-items:center; justify-content:center; padding:3rem; }
.loading-dots span { width:7px; height:7px; border-radius:50%; background:var(--ouro); animation:ld 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay:0.2s; }
.loading-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes ld { 0%,100%{transform:scale(0.7);opacity:0.4} 50%{transform:scale(1);opacity:1} }

/* Input modal (para ajustar interações) */
.input-modal { position:fixed; inset:0; z-index:300; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); }
.input-modal.open { display:flex; }
.input-modal-box { background:var(--bg2); border:1px solid var(--ouro-brd2); border-radius:var(--r-lg); padding:1.5rem; width:280px; }
.input-modal-titulo { font-family:var(--font-d); font-size:0.85rem; font-weight:800; color:var(--ouro-cl); margin-bottom:1rem; }
.input-modal-field { width:100%; background:var(--surf2); border:1px solid var(--ouro-brd); border-radius:var(--r-sm); padding:0.6rem 0.85rem; font-family:var(--font-b); font-size:0.95rem; color:var(--txt); outline:none; margin-bottom:1rem; }
.input-modal-field:focus { border-color:var(--ouro-brd2); }
.input-modal-acoes { display:flex; gap:0.5rem; }
.input-modal-acoes button { flex:1; padding:0.55rem; border-radius:var(--r-sm); font-family:var(--font-d); font-size:0.72rem; font-weight:700; cursor:pointer; }
.btn-confirmar { background:var(--ouro); color:var(--bg); border:none; }
.btn-cancelar  { background:transparent; color:var(--txt2); border:1px solid var(--ouro-brd); }
  
/* ── Tela de Login ── */
#tela-login {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg);
  padding: 2rem;
}
#tela-login.oculta { display: none; }

.login-logo { font-family: var(--font-d); font-size: 1.1rem; font-weight: 900; color: var(--ouro-cl); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.5rem; }
.login-sub  { font-size: 0.78rem; color: var(--txt2); margin-bottom: 2.5rem; }

.login-box {
  width: 100%; max-width: 320px;
  background: var(--bg2); border: 1px solid var(--ouro-brd);
  border-radius: 20px; padding: 2rem 1.75rem;
}
.login-titulo { font-family: var(--font-d); font-size: 1rem; font-weight: 800; color: var(--txt); margin-bottom: 0.3rem; }
.login-desc   { font-size: 0.78rem; color: var(--txt2); margin-bottom: 1.5rem; line-height: 1.5; }

.login-field  { margin-bottom: 1rem; }
.login-label  { display: block; font-family: var(--font-d); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--txt2); margin-bottom: 0.4rem; }
.login-input  { width: 100%; background: var(--surf2); border: 1px solid var(--ouro-brd); border-radius: 10px; padding: 0.7rem 1rem; font-size: 0.95rem; color: var(--txt); outline: none; transition: border-color 0.2s; font-family: var(--font-b); }
.login-input:focus { border-color: var(--ouro-brd2); }

.login-btn {
  width: 100%; padding: 0.85rem;
  background: linear-gradient(135deg, var(--ouro-f), var(--ouro));
  color: white; border: none; border-radius: 10px;
  font-family: var(--font-d); font-size: 0.85rem; font-weight: 800;
  cursor: pointer; transition: opacity 0.15s, transform 0.12s;
  margin-top: 0.25rem;
}
.login-btn:hover  { opacity: 0.88; }
.login-btn:active { transform: scale(0.98); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.login-erro { color: #F87171; font-size: 0.78rem; margin-top: 0.75rem; text-align: center; min-height: 1.2em; }


/* ── Gravação de áudio — Suellen ── */
.chat-rec-row-s {
  display:none; align-items:center; gap:0.5rem;
  animation: rec-ap 0.2s ease;
}
@keyframes rec-ap { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.chat-rec-row-s.visivel { display:flex; }
.btn-rec-cancel { flex-shrink:0; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:rgba(239,68,68,0.1); border:1.5px solid rgba(239,68,68,0.3); border-radius:50%; color:#EF4444; cursor:pointer; transition:background 0.15s; }
.btn-rec-cancel:hover { background:rgba(239,68,68,0.2); }
.btn-rec-cancel svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; }
.rec-visualizer-s { flex:1; display:flex; align-items:center; gap:0.5rem; background:var(--surf2); border:1px solid rgba(239,68,68,0.25); border-radius:22px; padding:0 0.85rem; height:40px; overflow:hidden; }
.rec-dot-s { flex-shrink:0; width:8px; height:8px; border-radius:50%; background:#EF4444; animation:rdot 1s ease-in-out infinite; }
@keyframes rdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.rec-wave-s { flex:1; height:32px; display:block; }
.rec-timer-s { flex-shrink:0; font-family:var(--font-d); font-size:0.75rem; font-weight:700; color:#EF4444; min-width:30px; text-align:right; }
.btn-rec-send { flex-shrink:0; width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--ouro-f),var(--ouro)); border-radius:50%; cursor:pointer; transition:transform 0.12s; }
.btn-rec-send:hover { transform:scale(1.06); }
.btn-rec-send svg { fill:white; width:15px; height:15px; }


/* Mapeamento de variáveis para bolhas de áudio no tema dark do painel */
.msg-wrap.aluna .msg-audio-bolha {
  background: var(--surf2);
  border: 1px solid var(--ouro-brd);
  border-bottom-left-radius: 3px;
  border-radius: 16px;
}
.msg-wrap.suellen .msg-audio-bolha {
  background: linear-gradient(135deg, var(--ouro-f), var(--ouro));
  border-bottom-right-radius: 3px;
  border-radius: 16px;
}
.msg-wrap.aluna .msg-audio-play-btn { background: var(--ouro-film); }
.msg-wrap.aluna .msg-audio-play-btn svg { fill: var(--ouro-cl); }
.msg-wrap.suellen .msg-audio-play-btn { background: rgba(255,255,255,0.18); }
.msg-wrap.suellen .msg-audio-play-btn svg { fill: white; }
.msg-wrap.aluna .msg-audio-wave-bar { fill: rgba(200,146,42,0.35); }
.msg-wrap.suellen .msg-audio-wave-bar { fill: rgba(255,255,255,0.32); }
.msg-wrap.aluna .msg-audio-wave-bar.ativa { fill: var(--ouro); }
.msg-wrap.suellen .msg-audio-wave-bar.ativa { fill: rgba(255,255,255,0.92); }
.msg-wrap.aluna .msg-audio-dur { color: var(--txt2); }
.msg-wrap.suellen .msg-audio-dur { color: rgba(255,255,255,0.75); }
/* Nome acima das bolhas — painel dark */
.msg-wrap.aluna .msg-bolha::before { color: var(--ouro-cl) !important; }
.msg-bolha { padding: 0.55rem 0.85rem; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; word-break: break-word; }
.msg-wrap.aluna .msg-bolha { background: var(--surf2); color: var(--txt); border-bottom-left-radius: 3px; }
.msg-wrap.suellen .msg-bolha { background: linear-gradient(135deg, var(--ouro-f), var(--ouro)); color: white; border-bottom-right-radius: 3px; }
.msg-hora { font-size: 0.62rem; color: var(--txt3); padding: 0 0.25rem; margin-top: 2px; }
.msg-audio-bolha { padding: 0.55rem 0.8rem; border-radius: 16px; display: flex; align-items: center; gap: 0.6rem; min-width: 175px; max-width: 250px; }
.msg-audio-play-btn { flex-shrink:0; width:30px; height:30px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.12s; }
.msg-audio-play-btn:hover { transform: scale(1.06); }
.msg-audio-play-btn svg { width:12px; height:12px; margin-left:2px; stroke:none; }
.msg-audio-wave { flex:1; display:block; }
.msg-audio-dur { flex-shrink:0; min-width:28px; text-align:right; font-family:var(--font-d); font-size:0.6rem; font-weight:700; }

</style>
</head>
<body>

<div id="app">

  <!-- ══════════ TELA DE LOGIN ══════════ -->
  <div id="tela-login">
    <div class="login-logo">✦ Vida Mágica</div>
    <div class="login-sub">Painel de Atendimento</div>
    <div class="login-box">
      <div class="login-titulo">Bem-vinda, Suellen 👋</div>
      <div class="login-desc">Digite sua senha para acessar o painel de atendimento.</div>
      <div class="login-field">
        <label class="login-label" for="login-senha">Senha</label>
        <input class="login-input" type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="login-btn">Entrar</button>
      <div class="login-erro" id="login-erro"></div>
    </div>
  </div>


  <!-- ══════════ TELA 1: LISTA ══════════ -->
  <div class="tela ativa" id="tela-lista">
    <div class="header">
      <span class="header-titulo">💬 Atendimento</span>
      <button class="header-btn" id="btn-atualizar" title="Atualizar">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
    <div class="lista-stats" id="lista-stats">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="conversas-scroll" id="conversas-scroll">
      <div class="loading-dots" style="padding:3rem"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ══════════ TELA 2: CHAT ══════════ -->
  <div class="tela fora-direita" id="tela-chat">
    <div class="header">
      <button class="header-btn" id="btn-voltar">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="chat-header-avatar" id="chat-header-avatar" onclick="irPara('perfil')">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="chat-header-info" onclick="irPara('perfil')">
        <div class="chat-header-nome" id="chat-header-nome">—</div>
        <div class="chat-header-status" id="chat-header-status">Basic</div>
      </div>
      <button class="header-btn" onclick="irPara('perfil')" title="Perfil da aluna">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </div>

    <div class="chat-msgs" id="chat-msgs">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Reply bar -->
    <div class="reply-bar" id="reply-bar">
      <div style="width:3px;background:var(--ouro);border-radius:2px;align-self:stretch;flex-shrink:0"></div>
      <div class="reply-bar-conteudo">
        <span class="reply-bar-autor" id="reply-autor"></span>
        <span class="reply-bar-texto" id="reply-texto"></span>
      </div>
      <button class="reply-bar-fechar" id="reply-fechar">✕</button>
    </div>

    <!-- Input -->
    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <button class="btn-icone" id="btn-anexo" title="Imagem">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <div class="chat-input-box">
          <textarea class="chat-input" id="chat-input" placeholder="Mensagem..." rows="1"></textarea>
        </div>
        <button class="btn-icone" id="btn-audio" title="Áudio">
          <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="btn-enviar" id="btn-enviar" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" fill="white"/></svg>
        </button>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>

  <!-- ══════════ TELA 3: PERFIL ══════════ -->
  <div class="tela fora-direita" id="tela-perfil">
    <div class="header">
      <button class="header-btn" onclick="irPara('chat')">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="header-titulo">Perfil da Aluna</span>
    </div>
    <div class="perfil-scroll" id="perfil-scroll">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

</div>

<!-- Context menu -->
<div id="msg-ctx-menu" class="msg-ctx-menu" style="display:none">
  <div class="msg-ctx-item" id="ctx-responder">
    <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
    Responder
  </div>
  <div class="msg-ctx-item" id="ctx-copiar">
    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copiar texto
  </div>
</div>

<!-- Modal de input numérico -->
<div class="input-modal" id="input-modal">
  <div class="input-modal-box">
    <div class="input-modal-titulo" id="input-modal-titulo">Ajustar interações</div>
    <input type="number" class="input-modal-field" id="input-modal-valor" placeholder="30" min="0" max="999">
    <div class="input-modal-acoes">
      <button class="btn-confirmar" id="input-modal-ok">Confirmar</button>
      <button class="btn-cancelar" onclick="fecharInputModal()">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════════════
   SUELLEN — Painel de Atendimento
   ════════════════════════════════════════════════ */

const API = '';

// ── Navegação entre telas ──
const TELAS = ['lista','chat','perfil'];
let telaAtual = 'lista';
let telaAnterior = 'lista';

function irPara(nova) {
  const atual = document.getElementById(`tela-${telaAtual}`);
  const destino = document.getElementById(`tela-${nova}`);
  const idx_atual = TELAS.indexOf(telaAtual);
  const idx_nova  = TELAS.indexOf(nova);
  const vai_direita = idx_nova > idx_atual;

  atual.classList.remove('ativa');
  atual.classList.add(vai_direita ? 'fora-esquerda' : 'fora-direita');
  destino.classList.remove('fora-direita','fora-esquerda');
  destino.classList.add('ativa');

  telaAnterior = telaAtual;
  telaAtual    = nova;

  if (nova === 'perfil' && convAtual) carregarPerfil(convAtual);
}

// ── Estado global ──
let conversas   = [];
let convAtual   = null;   // objeto conversa
let mensagens   = [];
let ws          = null;
let replyMsg    = null;   // mensagem sendo respondida
let ctxMsgAtual = null;   // mensagem com context menu aberto

// ── Toast ──
function toast(msg, tipo='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${tipo}`;
  setTimeout(() => t.className = '', 3000);
}

// ── Tempo relativo ──
function tempoRel(data) {
  const diff = Date.now() - new Date(data).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000);
  const d = Math.floor(diff/86400000), s = Math.floor(d/7);
  const me = Math.floor(d/30), a = Math.floor(d/365);
  if (m < 1) return 'agora';
  if (m < 60) return `${m}min`;
  if (h < 24) return `${h}h`;
  if (d < 7) return `${d}d`;
  if (s < 4) return `${s}sem`;
  if (me < 12) return `${me}m`;
  return `${a}a`;
}

// ── Hora formatada ──
function hora(data) {
  return new Date(data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

// ── Escape HTML ──
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ════════ LISTA DE CONVERSAS ════════ */
async function carregarLista() {
  try {
    const r = await fetch(`${API}/api/suellen/chat/conversas`, {
      headers: authHeader()
    });
    if (!r.ok) throw new Error();
    conversas = await r.json();
    renderLista();
    renderStats();
  } catch {
    document.getElementById('conversas-scroll').innerHTML = `<div class="lista-vazia"><div class="lista-vazia-icon">⚠️</div><p>Erro ao carregar. Verifique o acesso.</p></div>`;
  }
}

function renderStats() {
  const aguardando = conversas.filter(c => c.nao_lidas_suellen > 0).length;
  const prior      = conversas.filter(c => c.plano_chat === 'prioritario').length;
  document.getElementById('lista-stats').innerHTML = `
    ${aguardando ? `<span class="stat-pill aguardando">⚡ ${aguardando} aguardando</span>` : ''}
    ${prior      ? `<span class="stat-pill prior">⭐ ${prior} prioritário${prior>1?'s':''}</span>` : ''}
    <span class="stat-pill total">${conversas.length} total</span>
  `;
}

function renderLista() {
  const scroll = document.getElementById('conversas-scroll');
  if (!conversas.length) {
    scroll.innerHTML = `<div class="lista-vazia"><div class="lista-vazia-icon">💬</div><p>Nenhuma conversa ainda.</p></div>`;
    return;
  }
  scroll.innerHTML = conversas.map(c => {
    const isPrior   = c.plano_chat === 'prioritario';
    const naoLida   = c.nao_lidas_suellen > 0;
    const fotoHtml  = c.foto_url
      ? `<img src="${esc(c.foto_url)}" alt="${esc(c.nome)}">`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    return `
    <div class="conv-item${isPrior?' prior-item':''}" data-id="${c.id}" onclick="abrirConversa(${c.id})">
      <div class="conv-avatar">
        <div class="conv-avatar-img">${fotoHtml}</div>
        ${isPrior ? '<div class="conv-prior-badge">⭐</div>' : ''}
      </div>
      <div class="conv-corpo">
        <div class="conv-nome">${esc(c.nome||'—')}</div>
        <div class="conv-preview${naoLida?' nao-lida':''}">${esc(c.ultima_preview||'Nenhuma mensagem')}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-tempo">${tempoRel(c.ultima_mensagem_em)}</span>
        ${naoLida ? `<span class="conv-badge${isPrior?' prior-badge':''}">${c.nao_lidas_suellen}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ════════ ABRIR CONVERSA ════════ */
async function abrirConversa(id) {
  convAtual = conversas.find(c => c.id === id) || { id };
  irPara('chat');

  // Header
  document.getElementById('chat-header-nome').textContent   = convAtual.nome || '—';
  const statusEl = document.getElementById('chat-header-status');
  if (convAtual.plano_chat === 'prioritario') {
    statusEl.textContent = `⭐ Prioritário · ${convAtual.interacoes_restantes ?? '—'} interações`;
    statusEl.className   = 'chat-header-status prior';
  } else {
    statusEl.textContent = 'Chat Basic';
    statusEl.className   = 'chat-header-status';
  }
  // Foto
  const av = document.getElementById('chat-header-avatar');
  av.innerHTML = convAtual.foto_url
    ? `<img src="${esc(convAtual.foto_url)}" alt="${esc(convAtual.nome)}">`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

  // Carrega mensagens
  document.getElementById('chat-msgs').innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
  try {
    const r = await fetch(`${API}/api/suellen/chat/conversa/${id}`, { headers: authHeader() });
    const dados = await r.json();
    convAtual = { ...convAtual, ...dados.conversa };
    mensagens = dados.mensagens || [];
    renderMensagens();
    conectarWs();
  } catch {
    document.getElementById('chat-msgs').innerHTML = `<p style="color:var(--txt3);text-align:center;padding:2rem;font-size:0.82rem">Erro ao carregar mensagens.</p>`;
  }
}

/* ════════ MENSAGENS ════════ */
function renderMensagens() {
  const el = document.getElementById('chat-msgs');
  el.innerHTML = '';
  let ultimaData = null;
  mensagens.forEach(msg => {
    const dataMsg = new Date(msg.criado_em).toLocaleDateString('pt-BR');
    if (dataMsg !== ultimaData) {
      ultimaData = dataMsg;
      const sep = document.createElement('div');
      sep.className = 'msg-data-sep msg-wrap';
      sep.textContent = dataMsg;
      el.appendChild(sep);
    }
    el.appendChild(criarBolha(msg));
  });
  scrollChat();
}

function criarBolha(msg) {
  const isAluna = msg.remetente === 'aluna';
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${isAluna ? 'aluna' : 'suellen'}`;
  wrap.dataset.id = msg.id;

  let innerHtml = '';

  // Reply preview
  if (msg.reply_to_conteudo) {
    const autor = msg.reply_to_remetente === 'aluna' ? (convAtual.nome || 'Aluna') : 'Você';
    innerHtml += `<div class="msg-reply-preview"><span class="reply-autor">${esc(autor)}</span>${esc(msg.reply_to_conteudo).substring(0,80)}</div>`;
  }

  // Conteúdo
  if (msg.tipo === 'imagem' && msg.url) {
    innerHtml += `<div class="msg-img"><img src="${esc(msg.url)}" loading="lazy" onclick="window.open('${esc(msg.url)}','_blank')"></div>`;
  } else if (msg.tipo === 'audio' && msg.url) {
    innerHtml += `<audio controls src="${esc(msg.url)}" style="max-width:200px"></audio>`;
  } else {
    innerHtml += esc(msg.conteudo || '');
  }

  const bolha = document.createElement('div');
  bolha.className = 'msg-bolha';
  if (isAluna) bolha.dataset.nome = convAtual.nome || 'Aluna';
  bolha.innerHTML = innerHtml;

  // Context menu ao segurar / right-click
  const abrirCtx = (e) => {
    e.preventDefault();
    ctxMsgAtual = msg;
    mostrarCtxMenu(e.clientX || e.touches?.[0]?.clientX, e.clientY || e.touches?.[0]?.clientY);
  };
  bolha.addEventListener('contextmenu', abrirCtx);
  let holdTimer;
  bolha.addEventListener('touchstart',  () => { holdTimer = setTimeout(() => abrirCtx({ preventDefault:()=>{}, clientX:0, clientY:200 }), 500); }, { passive:true });
  bolha.addEventListener('touchend',    () => clearTimeout(holdTimer));
  bolha.addEventListener('touchmove',   () => clearTimeout(holdTimer));

  const hora_el = document.createElement('span');
  hora_el.className = 'msg-hora';
  hora_el.textContent = hora(msg.criado_em);

  wrap.appendChild(bolha);
  wrap.appendChild(hora_el);
  return wrap;
}

/* ════════ WEBSOCKET ════════ */
function conectarWs() {
  if (ws && ws.readyState <= 1) return;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const token = getToken() || '';
  ws = new WebSocket(`${proto}://${location.host}/ws/chat?token=${token}&modo=suellen`);
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.evento === 'nova_mensagem') {
        // Se a conversa aberta for a mesma, adiciona bolha
        if (data.conversa_id === convAtual?.id && data.mensagem.remetente === 'aluna') {
          mensagens.push(data.mensagem);
          document.getElementById('chat-msgs').appendChild(criarBolha(data.mensagem));
          scrollChat();
        }
        // Atualiza lista de qualquer forma
        carregarLista();
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(conectarWs, 4000);
}

  try {

      method:'POST', headers: { ...authHeader(), 'Content-Type':'application/json' },
      body: JSON.stringify({ conversa_id: convAtual.id, acao, valor }),

async function registrarPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const r = await fetch(`${API}/api/chat/vapid-public-key`);
    const { key } = await r.json();
    if (!key) return;
    const reg = await navigator.serviceWorker.register('/sw-suellen.js');
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: key,
    });
    await fetch(`${API}/api/suellen/chat/push-subscribe`, {
      method:'POST', headers: { ...authHeader(), 'Content-Type':'application/json' },
      body: JSON.stringify({ endpoint:sub.endpoint, keys:{ p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))), auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth')))) }, userAgent: navigator.userAgent }),
    });
  } catch {}
}

/* ════════ GRAVAÇÃO DE ÁUDIO — Suellen ════════ */
let sMediaRecorder = null, sAudioChunks = [], sAudioCtx = null, sAnalyser = null;
let sAnimFrame = null, sTimer = null, sSeg = 0, sMime = '', sPermissao = false;

function sFmtTempo(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function sDesenharOnda() {
  const canvas = document.getElementById('rec-wave-s');
  if (!canvas || !sAnalyser) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const buf = new Uint8Array(sAnalyser.frequencyBinCount);
  sAnalyser.getByteTimeDomainData(buf);
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();
  buf.forEach((v,i) => {
    const y = (v/128.0)*(H/2);
    i===0 ? ctx.moveTo(0,y) : ctx.lineTo(i*(W/buf.length),y);
  });
  ctx.strokeStyle = 'rgba(200,146,42,0.85)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  sAnimFrame = requestAnimationFrame(sDesenharOnda);
}

async function sIniciarGravacao() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    sPermissao = true;
    sMime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
    sMediaRecorder = new MediaRecorder(stream, { mimeType: sMime });
    sAudioChunks = []; sSeg = 0;

    sAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    sAnalyser = sAudioCtx.createAnalyser();
    sAnalyser.fftSize = 256;
    sAudioCtx.createMediaStreamSource(stream).connect(sAnalyser);

    // Mostra barra de gravação
    document.getElementById('chat-input-normal').style.display = 'none';
    const recRow = document.getElementById('chat-rec-row-s');
    recRow.classList.add('visivel');
    const canvas = document.getElementById('rec-wave-s');
    if (canvas) canvas.width = canvas.offsetWidth || 160;
    sDesenharOnda();

    document.getElementById('rec-timer-s').textContent = '0:00';
    sTimer = setInterval(() => {
      sSeg++;
      document.getElementById('rec-timer-s').textContent = sFmtTempo(sSeg);
      if (sSeg >= 120) sPararGravacao(true);
    }, 1000);

    sMediaRecorder.ondataavailable = e => { if(e.data.size>0) sAudioChunks.push(e.data); };
    sMediaRecorder.onstop = sFinalizarGravacao;
    sMediaRecorder.start(200);
  } catch {
    toast('Microfone indisponível. Verifique as permissões.', 'err');
  }
}

function sPararGravacao(enviar=true) {
  if (!sMediaRecorder || sMediaRecorder.state==='inactive') return;
  sMediaRecorder._enviar = enviar;
  sMediaRecorder.stop();
  sMediaRecorder.stream?.getTracks().forEach(t=>t.stop());
}

function sGerarWaveform(n=28) {
  const a=[]; for(let i=0;i<n;i++) a.push(Math.random()*0.7+0.15);
  for(let i=1;i<n-1;i++) a[i]=(a[i-1]+a[i]+a[i+1])/3;
  return a;
}

async function sFinalizarGravacao() {
  clearInterval(sTimer); cancelAnimationFrame(sAnimFrame);
  try { sAudioCtx?.close(); } catch {}
  sAnalyser = null; sAudioCtx = null;

  document.getElementById('chat-rec-row-s').classList.remove('visivel');
  document.getElementById('chat-input-normal').style.display = 'flex';

  if (!sMediaRecorder._enviar || sSeg < 1) return;

  const blob    = new Blob(sAudioChunks, { type: sMime });
  const alturas = sGerarWaveform();
  const dur     = sSeg;

  // Bolha otimista local
  const urlLocal = URL.createObjectURL(blob);
  const msgsEl   = document.getElementById('chat-msgs');
  const bolhaEl  = criarBolhaAudio({ id:Date.now(), remetente:'suellen', tipo:'audio', url:urlLocal, duracao:dur, criado_em:new Date().toISOString() }, alturas);
  msgsEl.appendChild(bolhaEl);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  try {
    // Upload para Cloudinary
    const form = new FormData();
    form.append('audio', blob, `audio-${Date.now()}.webm`);
    const r = await fetch(`${API}/api/upload/audio`, {
      method: 'POST',
      headers: authHeader(),
      body: form,
    });
    if (!r.ok) throw new Error('upload');
    const { url, duracao: durReal } = await r.json();

    // Envia para o chat
    await fetch(`${API}/api/suellen/chat/mensagem`, {
      method: 'POST',
      headers: { ...authHeader(), 'Content-Type':'application/json' },
      body: JSON.stringify({ conversa_id: convAtual.id, tipo:'audio', url, duracao: durReal||dur }),
    });
  } catch(err) {
    console.error('[Suellen audio upload]', err.message);
  }
}

// Bolha de áudio para o painel da Suellen (reutiliza a mesma lógica)
function criarBolhaAudio(msg, alturas) {
  const isAluna = msg.remetente === 'aluna';
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${isAluna?'aluna':'suellen'}`;

  const duracaoFmt = msg.duracao ? sFmtTempo(msg.duracao) : '0:00';
  const barCount = alturas.length, barW=3, gap=2, totalW=barCount*(barW+gap)-gap;
  const barsHtml = alturas.map((h,i)=>{
    const bh=Math.max(4,Math.round(h*24)), y=(28-bh)/2;
    return `<rect x="${i*(barW+gap)}" y="${y}" width="${barW}" height="${bh}" rx="1.5" class="msg-audio-wave-bar" data-idx="${i}"/>`;
  }).join('');

  wrap.innerHTML = `
    <div class="msg-audio-bolha">
      <button class="msg-audio-play-btn" data-url="${msg.url||''}">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <svg class="msg-audio-wave" viewBox="0 0 ${totalW} 28" width="${totalW}" height="28">
        ${barsHtml}
      </svg>
      <span class="msg-audio-dur">${duracaoFmt}</span>
    </div>
    <span class="msg-hora">${new Date(msg.criado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>
  `;

  // Player
  let audio = null;
  const playBtn = wrap.querySelector('.msg-audio-play-btn');
  const bars    = wrap.querySelectorAll('.msg-audio-wave-bar');
  const durEl   = wrap.querySelector('.msg-audio-dur');
  playBtn?.addEventListener('click', () => {
    if (!audio) {
      audio = new Audio(msg.url);
      audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        const pct=audio.currentTime/audio.duration, idx=Math.floor(pct*bars.length);
        bars.forEach((b,i)=>b.classList.toggle('ativa',i<=idx));
        const rem=Math.floor(audio.duration-audio.currentTime);
        durEl.textContent=sFmtTempo(rem);
      });
      audio.addEventListener('ended', ()=>{ bars.forEach(b=>b.classList.remove('ativa')); playBtn.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`; durEl.textContent=duracaoFmt; });
    }
    if (audio.paused) { audio.play(); playBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`; }
    else              { audio.pause(); playBtn.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`; }
  });
  return wrap;
}

// estilos de áudio definidos no CSS principal

// Botão microfone da Suellen
document.getElementById('btn-audio')?.addEventListener('click', sIniciarGravacao);
document.getElementById('btn-rec-cancel-s')?.addEventListener('click', ()=>sPararGravacao(false));
document.getElementById('btn-rec-send-s')?.addEventListener('click', ()=>sPararGravacao(true));

</script>
</body>
